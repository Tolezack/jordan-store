/* V104: esconde os três pontinhos quando a barra lateral está aberta */

/* V102: remove o "com Pix" verde das miniaturas/cards */

/* V103: slide de imagens no index principal */
.hero-com-slider .hero-banner,
.hero-slider {
  position: relative;
  overflow: hidden;
  background: #111;
}

.hero-track {
  display: flex;
  width: 100%;
  height: 100%;
  transition: transform 0.45s ease;
  will-change: transform;
}

.hero-slide {
  min-width: 100%;
  width: 100%;
  height: 100%;
  flex: 0 0 100%;
  background: #111;
}

.hero-slide img {
  width: 100%;
  height: 100%;
  min-height: 420px;
  display: block;
  object-fit: cover;
}

.hero-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 48px;
  height: 48px;
  background: rgba(0, 0, 0, 0.62);
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.25);
  font-size: 34px;
  font-weight: 900;
  line-height: 1;
  z-index: 8;
  cursor: pointer;
}

.hero-prev { left: 14px; }
.hero-next { right: 14px; }

.hero-dots {
  position: absolute;
  left: 50%;
  bottom: 14px;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 8;
}

.hero-dots button {
  width: 11px;
  height: 11px;
  border: 0;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.45);
  cursor: pointer;
}

.hero-dots button.active { background: #fff; }

}

  <script>
    const API_URL = "https://jordan-store-backend.onrender.com".replace(/\/$/, "");
    const FRETE_GRATIS_ACIMA = 400;

    let produtos = [];
    let produtosRender = [];
    let carrinho = JSON.parse(localStorage.getItem("jws_cart") || "[]");
    let currentCategory = "all";
    let adminToken = localStorage.getItem("jws_admin_token") || "";
    let adminProdutos = [];
    let adminPedidos = [];
    let adminAba = "produtos";
    const MINHAS_COMPRAS_KEY = "jws_minhas_compras";
    let checkoutFrete = null;
    let checkoutEndereco = null;
    let opcoesFreteAtual = [];
    let freteSelecionado = null;

    const categoriaNomes = { all:"produtos", camisa:"camisas", calca:"calças", tenis:"tênis", bermuda:"bermudas", moletom:"moletons" };

    async function fetchComTempo(url, options = {}, tempo = 12000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), tempo);
      try {
        return await fetch(url, { ...options, cache: "no-store", signal: controller.signal });
      } finally {
        clearTimeout(timer);
      }
    }


    function removerTextoComPixPrincipal() {
      document.querySelectorAll(".product-card").forEach(card => {
        card.querySelectorAll("*").forEach(el => {
          const texto = (el.textContent || "").trim().toLowerCase();

          if (texto === "com pix" || texto === "no pix" || texto === "pix") {
            el.remove();
            return;
          }

          if (texto.includes("com pix") && !el.classList.contains("product-price")) {
            el.textContent = el.textContent.replace(/\s*com\s*pix\s*/gi, "").trim();
          }
        });

        const preco = card.querySelector(".product-price");
        if (preco) {
          preco.childNodes.forEach(node => {
            if (node.nodeType === Node.TEXT_NODE) {
              node.textContent = node.textContent.replace(/\s*com\s*pix\s*/gi, "");
            }
          });
        }
      });
    }

    document.addEventListener("DOMContentLoaded", () => { carregarProdutos();
      iniciarSlidePrincipal();
      removerTextoComPixPrincipal();
      setTimeout(removerTextoComPixPrincipal, 800); updateCart(); });
    document.addEventListener("keydown", e => { if (e.ctrlKey && e.altKey && e.key === "8") { e.preventDefault(); openAdmin(); } });

    function normalizarTexto(texto) { return String(texto || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim(); }
    function normalizarCategoria(categoria) {
      const c = normalizarTexto(categoria);
      if (c.includes("camisa") || c.includes("camiseta")) return "camisa";
      if (c.includes("calca")) return "calca";
      if (c.includes("tenis") || c.includes("sapato")) return "tenis";
      if (c.includes("bermuda") || c.includes("short")) return "bermuda";
      if (c.includes("moletom") || c.includes("blusa")) return "moletom";
      return c || "camisa";
    }
    function normalizarTamanho(tamanho) { return String(tamanho || "").trim().toUpperCase(); }
    function money(value) { return Number(value || 0).toFixed(2).replace(".", ","); }
    function numero(value) { return Number(value || 0); }
    function escapeHtml(text) { return String(text || "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;"); }

    function getEstoqueTamanhos(produto) {
      const estoque = produto.estoqueTamanhos || produto.estoque_tamanhos || produto.estoques || {};
      const limpo = {};
      if (estoque && typeof estoque === "object" && !Array.isArray(estoque)) {
        Object.entries(estoque).forEach(([tamanho, quantidade]) => {
          const tam = normalizarTamanho(tamanho);
          if (tam) limpo[tam] = Number(quantidade || 0);
        });
      }
      return limpo;
    }
    function getEstoqueTotal(produto) {
      const estoque = getEstoqueTamanhos(produto);
      const valores = Object.values(estoque);
      if (valores.length) return valores.reduce((s, v) => s + Number(v || 0), 0);
      return Number(produto.estoque || 0);
    }
    function getTamanhosProduto(produto) {
      const estoque = getEstoqueTamanhos(produto);
      const tamanhosEstoque = Object.keys(estoque);
      if (tamanhosEstoque.length) return tamanhosEstoque;
      if (Array.isArray(produto.tamanhos) && produto.tamanhos.length) return produto.tamanhos.map(normalizarTamanho).filter(Boolean);
      return ["P", "M", "G", "GG"];
    }
    function getFotosProduto(produto) {
      const fotos = [];
      if (produto.imagem) fotos.push(String(produto.imagem).trim());
      if (Array.isArray(produto.imagens)) produto.imagens.forEach(img => { const foto = String(img || "").trim(); if (foto && !fotos.includes(foto)) fotos.push(foto); });
      return fotos.filter(Boolean);
    }
    function normalizarProduto(p) {
      const fotos = getFotosProduto(p);
      const estoqueTamanhos = getEstoqueTamanhos(p);
      return {
        ...p,
        id: String(p.id || `produto-${Date.now()}`).trim(), nome: String(p.nome || "Produto sem nome").trim(), categoria: normalizarCategoria(p.categoria), preco: Number(p.preco || 0),
        custoFornecedor: Number(p.custoFornecedor ?? p.custo_fornecedor ?? p.custo ?? 0),
        custo_fornecedor: Number(p.custoFornecedor ?? p.custo_fornecedor ?? p.custo ?? 0),
        estoque: getEstoqueTotal(p), estoqueTamanhos, estoque_tamanhos: estoqueTamanhos,
        imagem: fotos[0] || String(p.imagem || "").trim(), imagens: fotos,
        descricao: String(p.descricao || "").trim(), tamanhos: getTamanhosProduto(p)
      };
    }

    function limparCep(cep) { return String(cep || "").replace(/\D/g, "").slice(0, 8); }

    function calcularPacPorUF(uf) {
      const estado = String(uf || "").toUpperCase();
      if (estado === "RS") return 16.90;
      if (["SC", "PR"].includes(estado)) return 24.90;
      if (["SP", "RJ", "MG", "ES"].includes(estado)) return 29.90;
      if (["DF", "GO", "MT", "MS"].includes(estado)) return 34.90;
      if (["BA", "SE", "AL", "PE", "PB", "RN", "CE", "PI", "MA"].includes(estado)) return 39.90;
      if (["AM", "PA", "AC", "RO", "RR", "AP", "TO"].includes(estado)) return 49.90;
      return 39.90;
    }

    function calcularSedexPorUF(uf) {
      const estado = String(uf || "").toUpperCase();
      if (estado === "RS") return 26.90;
      if (["SC", "PR"].includes(estado)) return 34.90;
      if (["SP", "RJ", "MG", "ES"].includes(estado)) return 44.90;
      if (["DF", "GO", "MT", "MS"].includes(estado)) return 49.90;
      if (["BA", "SE", "AL", "PE", "PB", "RN", "CE", "PI", "MA"].includes(estado)) return 59.90;
      if (["AM", "PA", "AC", "RO", "RR", "AP", "TO"].includes(estado)) return 69.90;
      return 59.90;
    }

    function calcularOpcoesFrete(endereco, subtotal) {
      const cidade = normalizarTexto(endereco.localidade || endereco.cidade || "");
      const uf = String(endereco.uf || "").toUpperCase();
      const ehIvoti = cidade.includes("ivoti");

      if (ehIvoti) {
        return [
          { tipo: "PAC", nome: "PAC - Entrega local", valor: 0, prazo: "Combinar entrega" },
          { tipo: "SEDEX", nome: "SEDEX", valor: 12.90, prazo: "1 a 2 dias úteis" }
        ];
      }

      return [
        { tipo: "PAC", nome: "PAC", valor: Number(subtotal || 0) >= FRETE_GRATIS_ACIMA ? 0 : calcularPacPorUF(uf), prazo: "5 a 12 dias úteis" },
        { tipo: "SEDEX", nome: "SEDEX", valor: calcularSedexPorUF(uf), prazo: "2 a 5 dias úteis" }
      ];
    }

    function getEstoqueMaxCarrinho(item) {
      const produto = acharProdutoDoCarrinho(item);
      if (!produto) return Infinity;

      const estoqueTamanhos = getEstoqueTamanhos(produto);
      const tamanho = normalizarTamanho(item.tamanho || item.size || "");

      if (tamanho && Object.keys(estoqueTamanhos).length > 0) {
        return Number(estoqueTamanhos[tamanho] ?? 0);

      return Number(getEstoqueTotal(produto) || 0);

    function updateCart() {
      const count = carrinho.reduce((s, i) => s + Number(i.quantidade || 0), 0);
      const countEl = document.querySelector(".cart-count"); if (countEl) countEl.textContent = count;
      const items = document.getElementById("cartItems"), summary = document.getElementById("cartSummary"), checkout = document.getElementById("checkoutBtn"), clear = document.getElementById("clearCartBtn"); if (!items) return;
      if (!carrinho.length) { items.innerHTML = `<div class="empty-cart"><div>🛍️</div><p>Carrinho vazio</p></div>`; summary.style.display="none"; checkout.style.display="none"; clear.style.display="none"; return; }

      items.innerHTML = carrinho.map(item => {
        const key = getCartKey(item);

        const limiteTexto = Number.isFinite(max) ? `<small style="display:block;color:#777;margin-top:3px">máx. ${max} un.</small>` : "";
        const plusDisabled = Number.isFinite(max) && quantidade >= max ? "disabled" : "";
        return `<div class="cart-item"><img class="cart-item-image" src="${item.imagem || "https://via.placeholder.com/200"}" onerror="this.src='https://via.placeholder.com/200'" /><div><div class="cart-item-name">${escapeHtml(item.nome)}${item.tamanho ? ` - ${escapeHtml(item.tamanho)}` : ""}</div><div class="cart-item-price">R$ ${money(Number(item.preco || 0) * quantidade)}</div>${limiteTexto}<div class="cart-item-actions"><div class="quantity-control"><button class="quantity-btn" onclick="changeQty('${key}', -1)">-</button><span>${quantidade}</span><button class="quantity-btn" ${plusDisabled} onclick="changeQty('${key}', 1)">+</button></div><button class="remove-item" onclick="removeItem('${key}')">remover</button></div></div></div>`;
      }).join("");

    function getCarrinhoSubtotal() { return carrinho.reduce((s, i) => s + Number(i.preco || 0) * Number(i.quantidade || 0), 0); }
    function changeQty(cartId, amount) {
      const item = carrinho.find(i => getCartKey(i) === String(cartId));
      if (!item) return;
      const atual = Number(item.quantidade || 1);
      const nova = atual + amount;
      if (nova <= 0) return removeItem(cartId);
      const max = getEstoqueMaxCarrinho(item);
      if (Number.isFinite(max) && nova > max) {
        notify(`Só tem ${max} unidade(s) em estoque.`, "error");
        item.quantidade = Math.max(1, max);
        saveCart();
        updateCart();
        return;
      }
      item.quantidade = nova;
      saveCart();
      updateCart();

    async function validarCarrinhoComEstoqueAtual() {
      let produtosAtualizados = [];

      try {
        produtosAtualizados = await carregarProdutosAtualizadosParaCarrinho();
      } catch (err) {
        console.error(err);
        alert("Não consegui conferir o estoque atualizado. Tente novamente em alguns segundos.");
        return false;
      }

      const carrinhoCorrigido = [];
      let carrinhoMudou = false;
      let mensagens = [];

      for (const item of carrinho) {
        const idItem = String(item.produtoId || item.id || "");
        const nomeItem = normalizarTexto(item.nome || "");

        const produtoAtual =
          produtosAtualizados.find(p => String(p.id) === idItem) ||
          produtosAtualizados.find(p => normalizarTexto(p.nome || "") === nomeItem);

        if (!produtoAtual) {
          carrinhoMudou = true;
          mensagens.push(`${item.nome || "Produto"} saiu da loja.`);
          continue;
        }

        const estoqueTamanhos = getEstoqueTamanhos(produtoAtual);
        const tamanhoItem = normalizarTamanho(item.tamanho || item.size || "");
        let estoqueDisponivel = 0;

        if (tamanhoItem && Object.keys(estoqueTamanhos).length > 0) {
          estoqueDisponivel = Number(estoqueTamanhos[tamanhoItem] || 0);
        } else {
          estoqueDisponivel = Number(getEstoqueTotal(produtoAtual) || 0);
        }

        if (estoqueDisponivel <= 0) {
          carrinhoMudou = true;
          mensagens.push(`${produtoAtual.nome} ${tamanhoItem ? "tam. " + tamanhoItem : ""} está sem estoque.`);
          continue;
        }

        const quantidadeAntiga = Math.max(1, Number(item.quantidade || 1));
        const quantidadeNova = Math.min(quantidadeAntiga, estoqueDisponivel);
        const precoAtual = Number(produtoAtual.preco || 0);

        if (quantidadeNova !== quantidadeAntiga) {
          carrinhoMudou = true;
          mensagens.push(`${produtoAtual.nome} foi ajustado para ${quantidadeNova} un.`);
        }

        if (Number(item.preco || 0) !== precoAtual) {
          carrinhoMudou = true;
          mensagens.push(`${produtoAtual.nome} mudou de preço.`);
        }

        carrinhoCorrigido.push({
          ...item,
          id: produtoAtual.id,
          produtoId: produtoAtual.id,
          nome: produtoAtual.nome,
          categoria: produtoAtual.categoria,
          preco: precoAtual,
          custoFornecedor: Number(produtoAtual.custoFornecedor ?? produtoAtual.custo_fornecedor ?? produtoAtual.custo ?? item.custoFornecedor ?? 0),
          custo_fornecedor: Number(produtoAtual.custoFornecedor ?? produtoAtual.custo_fornecedor ?? produtoAtual.custo ?? item.custoFornecedor ?? 0),
          imagem: getFotosProduto(produtoAtual)[0] || produtoAtual.imagem || item.imagem || "",
          tamanho: tamanhoItem || item.tamanho || "",
          quantidade: quantidadeNova,
          estoque: estoqueDisponivel
        });
      }

      produtos = produtosAtualizados;
      produtosRender = [...produtosAtualizados];
      renderProducts();

      if (carrinhoMudou) {
        carrinho = carrinhoCorrigido;
        saveCart();
        updateCart();
        closeCheckout();

        const resumo = mensagens.slice(0, 4).join("\n");
        alert(`O carrinho foi atualizado porque o estoque/preço mudou.\n\n${resumo}\n\nConfira o carrinho e tente finalizar de novo.`);
        return false;
      }

      if (carrinhoCorrigido.length === 0) {
        carrinho = [];
        saveCart();
        updateCart();
        closeCheckout();
        alert("Seu carrinho ficou vazio porque os produtos não têm mais estoque.");
        return false;
      }

      carrinho = carrinhoCorrigido;
      saveCart();
      updateCart();
      return true;
    }

    async function calcularFreteCheckout() {

      const body=document.getElementById("adminBody");
      body.innerHTML=`<div class="loading"><div><div class="spinner"></div><p>Carregando painel...</p></div></div>`;
      try{
        const [prodRes, pedRes] = await Promise.all([
          fetchComTempo(`${API_URL}/api/admin/produtos?cache=${Date.now()}`, {headers:{Authorization:`Bearer ${adminToken}`}}, 15000),
          fetchComTempo(`${API_URL}/api/admin/pedidos?cache=${Date.now()}`, {headers:{Authorization:`Bearer ${adminToken}`}}, 15000)
        ]);
        const prodData=await prodRes.json();
        const pedData=await pedRes.json();
        if(!prodData.ok){ adminLogout(); return notify(prodData.erro||"Login expirou","error"); }
        if(!pedData.ok){ adminLogout(); return notify(pedData.erro||"Login expirou","error"); }
        adminProdutos=(Array.isArray(prodData.produtos)?prodData.produtos:[]).map(normalizarProduto);
        adminPedidos=Array.isArray(pedData.pedidos)?pedData.pedidos:[];
        renderAdmin();
      }catch(err){
        console.error(err);
        body.innerHTML=`<div class="erro"><div><h1>Erro no painel</h1><p>O backend não respondeu. Espera o Render acordar e tenta de novo.</p><button class="submit" onclick="loadAdminData()">Tentar novamente</button><button class="clear" onclick="adminLogout()">Entrar de novo</button></div></div>`;
        notify("Erro ao carregar admin","error");
      }
    }
    async function loadAdminProducts(){ return loadAdminData(); }
    function formatEstoqueTamanhos(estoqueTamanhos,tamanhos){ const estoque=estoqueTamanhos&&typeof estoqueTamanhos==="object"?estoqueTamanhos:{}; const lista=Object.keys(estoque).length?Object.keys(estoque):(Array.isArray(tamanhos)&&tamanhos.length?tamanhos:["P","M","G","GG"]); return lista.map(t=>{const tam=normalizarTamanho(t); return `${tam}: ${Number(estoque[tam] ?? estoque[t] ?? 0)}`;}).join("\n"); }
    function parseEstoqueTamanhos(texto){ const obj={}; const regex=/([A-Za-z0-9À-ÿ]+)\s*:\s*([0-9]+)/g; let match; while((match=regex.exec(String(texto||"")))!==null){ const tamanho=normalizarTamanho(match[1]); const quantidade=Number(match[2]||0); if(tamanho) obj[tamanho]=quantidade; } return obj; }
    function setAdminAba(aba){ adminAba=aba; renderAdmin(); }
    function statusPedidoLabel(status){
      const s = String(status || "").toLowerCase();
      if(s === "aprovado" || s === "pago") return "Aprovado / estoque baixado";
      if(s === "entregue") return "Entregue";
      if(s === "recusado" || s === "negado") return "Recusado";
      if(s === "pendente" || s === "comprovante_enviado") return "Pendente";
      return "Aguardando Pix";
    }
    function statusPedidoClass(status){
      const s = String(status || "").toLowerCase();
      if(s === "aprovado" || s === "pago" || s === "entregue") return "ok";
      if(s === "recusado" || s === "negado") return "danger";
      if(s === "pendente" || s === "comprovante_enviado") return "warn";
      return "wait";
    }
    function renderAdmin(){
      const pendentes = adminPedidos.filter(p=>!["aprovado","pago","recusado","negado"].includes(String(p.status||""))).length;
      document.getElementById("adminBody").innerHTML = `
        <div class="admin-toolbar">
          <button class="submit" onclick="setAdminAba('produtos')">Produtos</button>
          <button class="submit" onclick="setAdminAba('pedidos')">Pedidos${pendentes ? ` (${pendentes})` : ""}</button>
          <button class="submit" onclick="setAdminAba('relatorios')">Relatórios semanais</button>

    function isPedidoAprovado(p){
      const status = String(p.status || "").toLowerCase();
      return status === "aprovado" || status === "pago" || status === "aceito" || status === "confirmado";
    }
    function getDataPedido(p){
      const raw = p.confirmadoEm || p.pagoEm || p.aprovadoEm || p.atualizadoEm || p.criadoEm || "";
      const data = new Date(raw);
      return Number.isNaN(data.getTime()) ? null : data;
    }
    function getInicioSemana(data = new Date()){
      const d = new Date(data);
      const dia = d.getDay() || 7;
      d.setHours(0,0,0,0);
      d.setDate(d.getDate() - dia + 1);
      return d;
    }
    function estaNaSemanaAtual(data){
      if(!data) return false;
      const inicio = getInicioSemana(new Date());
      const fim = new Date(inicio);
      fim.setDate(fim.getDate() + 7);
      return data >= inicio && data < fim;
    }
    function getProdutoAdminPorItem(item){
      const id = String(item.produtoId || item.id || "");
      const nome = normalizarTexto(item.nome || "");
      return adminProdutos.find(p=>String(p.id)===id) || adminProdutos.find(p=>normalizarTexto(p.nome||"")===nome) || null;
    }
    function getCustoUnitarioItem(item){
      const produto = getProdutoAdminPorItem(item);
      return Number(item.custoFornecedor ?? item.custo_fornecedor ?? produto?.custoFornecedor ?? produto?.custo_fornecedor ?? produto?.custo ?? 0);
    }
    function getPedidosAprovadosSemanaAtual(){
      return adminPedidos.filter(p=>isPedidoAprovado(p) && estaNaSemanaAtual(getDataPedido(p)));
    }
    function calcularRelatorioAdmin(){
      const pedidosMes = getPedidosAprovadosSemanaAtual();
      const dias = {};
      const ranking = {};
      let receita = 0, custo = 0, unidades = 0;
      pedidosMes.forEach(p=>{
        const data = getDataPedido(p) || new Date();
        const dia = String(data.getDate()).padStart(2,"0");
        if(!dias[dia]) dias[dia] = {dia, receita:0, custo:0, lucro:0};
        const itens = Array.isArray(p.itens) && p.itens.length ? p.itens : [{nome:p.nome||"Pedido", quantidade:p.quantidade||1, preco:p.total||0, tamanho:p.tamanho||""}];
        itens.forEach(item=>{
          const qtd = Math.max(1, Number(item.quantidade || 1));
          const venda = Number(item.preco || 0) * qtd;
          const custoItem = getCustoUnitarioItem(item) * qtd;
          receita += venda;
          custo += custoItem;
          unidades += qtd;
          dias[dia].receita += venda;
          dias[dia].custo += custoItem;
          dias[dia].lucro += venda - custoItem;
          const nome = String(item.nome || "Produto").trim() || "Produto";
          if(!ranking[nome]) ranking[nome] = {nome, quantidade:0, receita:0};
          ranking[nome].quantidade += qtd;
          ranking[nome].receita += venda;
        });
      });
      const lucro = receita - custo;
      const diasOrdenados = Object.values(dias).sort((a,b)=>Number(a.dia)-Number(b.dia));
      const rankingOrdenado = Object.values(ranking).sort((a,b)=>b.quantidade-a.quantidade || b.receita-a.receita).slice(0,8);
      return {pedidosMes, receita, custo, lucro, unidades, diasOrdenados, rankingOrdenado};
    }
    function renderGraficoBarrasAdmin(itens, valorKey, labelKey, valorFormatador){
      if(!itens.length) return `<div class="erro"><div><h1>Sem dados</h1><p>Ainda não tem pedido aprovado neste mês.</p></div></div>`;
      const max = Math.max(...itens.map(i=>Number(i[valorKey]||0)), 1);
      return `<div class="admin-bars">${itens.map(i=>{
        const valor = Number(i[valorKey]||0);
        const width = Math.max(3, (valor / max) * 100);
        return `<div class="admin-bar-row"><div class="admin-bar-name" title="${escapeHtml(i[labelKey])}">${escapeHtml(i[labelKey])}</div><div class="admin-bar-track"><div class="admin-bar-fill" style="width:${width}%"></div></div><div class="admin-bar-value">${valorFormatador(valor, i)}</div></div>`;
      }).join("")}</div>`;
    }
    function renderGraficoLucroAdmin(dias){
      if(!dias.length) return `<div class="erro"><div><h1>Sem lucro</h1><p>Sem pedidos aprovados nesta semana.</p></div></div>`;
      const w=720, h=240, pad=34;
      const valores = dias.map(d=>Number(d.lucro||0));
      const min = Math.min(0, ...valores), max = Math.max(1, ...valores);
      const range = max - min || 1;
      const x = i => pad + (dias.length === 1 ? (w-pad*2)/2 : i * ((w-pad*2)/(dias.length-1)));
      const y = v => h - pad - ((v - min) / range) * (h - pad*2);
      const points = dias.map((d,i)=>`${x(i)},${y(Number(d.lucro||0))}`).join(" ");
      const circles = dias.map((d,i)=>`<circle cx="${x(i)}" cy="${y(Number(d.lucro||0))}" r="4"><title>Dia ${d.dia}: R$ ${money(d.lucro)}</title></circle>`).join("");
      const labels = dias.map((d,i)=>`<text x="${x(i)}" y="${h-10}" text-anchor="middle" font-size="11">${d.dia}</text>`).join("");
      return `<svg class="admin-line-chart" viewBox="0 0 ${w} ${h}" role="img" aria-label="Lucro líquido por dia"><line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#ccc"/><line x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}" stroke="#ccc"/><polyline fill="none" stroke="#111" stroke-width="4" points="${points}"/>${circles}${labels}<text x="${pad}" y="20" font-size="11" fill="#666">R$ ${money(max)}</text><text x="${pad}" y="${h-pad-4}" font-size="11" fill="#666">R$ ${money(min)}</text></svg>`;
    }
    function renderAdminRelatorios(){
      const r = calcularRelatorioAdmin();
      const mes = `Semana de ${getInicioSemana(new Date()).toLocaleDateString("pt-BR")}`;
      return `<div class="admin-report-grid">
        <div class="admin-report-card"><small>Lucro líquido da semana</small><strong>R$ ${money(r.lucro)}</strong><span>Receita menos custo fornecedor.</span></div>

        <div class="admin-report-card"><small>Custo fornecedor</small><strong>R$ ${money(r.custo)}</strong><span>Baseado no campo custo dos produtos.</span></div>

      <div class="admin-chart-box"><div class="admin-chart-head"><h4>Roupas mais vendidas da semana</h4><small>Ranking por quantidade vendida<br>Somente pedidos aprovados.</small></div>${renderGraficoBarrasAdmin(r.rankingOrdenado,"quantidade","nome",(v,i)=>`${v} un. • R$ ${money(i.receita)}`)}</div>

    function adminProductHtml(p,i){ const fotos=getFotosProduto(p); const estoque=getEstoqueTamanhos(p); return `<div class="admin-product"><div class="admin-product-top"><img src="${fotos[0]||"https://via.placeholder.com/120"}" onerror="this.src='https://via.placeholder.com/120'" /><div><b>${escapeHtml(p.nome)}</b><small>${escapeHtml(p.id)}</small><small>${fotos.length} foto(s) • estoque total ${getEstoqueTotal(p)}</small></div></div><div class="admin-grid"><div class="form-group"><label>ID</label><input value="${escapeHtml(p.id)}" oninput="adminProdutos[${i}].id=this.value" /></div><div class="form-group"><label>Nome</label><input value="${escapeHtml(p.nome)}" oninput="adminProdutos[${i}].nome=this.value" /></div><div class="form-group"><label>Categoria</label><select onchange="adminProdutos[${i}].categoria=this.value"><option value="camisa" ${p.categoria==='camisa'?'selected':''}>Camisa</option><option value="calca" ${p.categoria==='calca'?'selected':''}>Calça</option><option value="tenis" ${p.categoria==='tenis'?'selected':''}>Tênis</option><option value="bermuda" ${p.categoria==='bermuda'?'selected':''}>Bermuda</option><option value="moletom" ${p.categoria==='moletom'?'selected':''}>Moletom</option></select></div><div class="form-group"><label>Preço</label><input type="number" step="0.01" value="${Number(p.preco||0)}" oninput="adminProdutos[${i}].preco=Number(this.value)" /></div><div class="form-group"><label>Custo fornecedor</label><input type="number" step="0.01" value="${Number(p.custoFornecedor ?? p.custo_fornecedor ?? p.custo ?? 0)}" oninput="adminProdutos[${i}].custoFornecedor=Number(this.value);adminProdutos[${i}].custo_fornecedor=Number(this.value)" /></div></div><div class="form-group"><label>Fotos do produto / miniatura</label><textarea class="admin-big-textarea" oninput="atualizarFotosAdmin(${i}, this.value)">${escapeHtml(fotos.join("\n"))}</textarea></div><div class="admin-grid"><div class="form-group"><label>Tamanhos separados por vírgula</label><input value="${escapeHtml(getTamanhosProduto(p).join(", "))}" onchange="atualizarTamanhosAdmin(${i}, this.value)" /></div><div class="form-group"><label>Estoque por tamanho</label><textarea oninput="atualizarEstoqueAdmin(${i}, this.value)">${formatEstoqueTamanhos(estoque,getTamanhosProduto(p))}</textarea></div></div><div class="form-group"><label>Descrição</label><textarea oninput="adminProdutos[${i}].descricao=this.value">${escapeHtml(p.descricao)}</textarea></div><button class="clear danger" onclick="deleteAdminProduct(${i})">Excluir produto</button></div>`; }

    function deleteAdminProduct(index){ if(!confirm("Excluir produto?")) return; adminProdutos.splice(index,1); renderAdmin(); }
    async function saveAdminProducts(){
      try{
        const produtosParaSalvar=adminProdutos.map(normalizarProduto);
        notify("Salvando produtos...","success");
        const res=await fetchComTempo(`${API_URL}/api/admin/produtos`,{method:"PUT",headers:{"Content-Type":"application/json",Authorization:`Bearer ${adminToken}`},body:JSON.stringify({produtos:produtosParaSalvar})}, 20000);
        const data=await res.json();
        if(!data.ok) return notify(data.erro||"Erro ao salvar","error");
        adminProdutos=(Array.isArray(data.produtos)?data.produtos:produtosParaSalvar).map(normalizarProduto);
        produtos=[...adminProdutos];
        produtosRender=[...produtos];
        renderAdmin();
        renderProducts();
        updateCart();
        notify("Produtos salvos. Atualiza a página com Ctrl+F5 se o GitHub demorar.","success");
      }catch(err){
        console.error(err);
        notify("Erro ao salvar produtos. Confere Render/GITHUB_TOKEN.","error");
      }
    }
    async function confirmarPedido(id){
      const pedido = adminPedidos.find(p=>String(p.id)===String(id));
      if(!pedido) return;
      if(!pedido.comprovanteLink && !pedido.comprovanteImagem && !confirm("Esse pedido não tem comprovante. Aceitar mesmo assim?")) return;
      if(!confirm(`Aceitar pagamento do pedido ${id} e baixar o estoque?`)) return;
      try{
        notify("Confirmando pedido...","success");
        const res=await fetchComTempo(`${API_URL}/api/admin/pedidos/${encodeURIComponent(id)}/confirmar`,{method:"POST",headers:{Authorization:`Bearer ${adminToken}`}}, 20000);
        const data=await res.json();
        if(!data.ok) return notify(data.erro||"Erro ao confirmar pedido","error");
        adminPedidos=Array.isArray(data.pedidos)?data.pedidos:adminPedidos;
        adminProdutos=(Array.isArray(data.produtos)?data.produtos:adminProdutos).map(normalizarProduto);
        produtos=[...adminProdutos]; produtosRender=[...produtos];
        renderAdmin(); renderProducts(); updateCart();
        notify("Pedido aceito e estoque baixado.","success");
      }catch(err){ console.error(err); notify("Erro ao confirmar pedido.","error"); }
    }
    async function negarPedido(id){
      if(!confirm(`Recusar pedido ${id}?`)) return;
      try{
        const res=await fetchComTempo(`${API_URL}/api/admin/pedidos/${encodeURIComponent(id)}/negar`,{method:"POST",headers:{Authorization:`Bearer ${adminToken}`}}, 15000);
        const data=await res.json();
        if(!data.ok) return notify(data.erro||"Erro ao negar pedido","error");
        adminPedidos=Array.isArray(data.pedidos)?data.pedidos:adminPedidos;
        renderAdmin();
        notify("Pedido negado.","success");
      }catch(err){ console.error(err); notify("Erro ao negar pedido.","error"); }
    }

    function getMinhasComprasLocal(){
      try { return JSON.parse(localStorage.getItem(MINHAS_COMPRAS_KEY) || "[]"); }
      catch(err){ return []; }
    }

      const compras = getMinhasComprasLocal();
      if(!compras.some(p=>String(p.id)===String(pedido.id))){
        compras.unshift({ ...pedido, salvoLocalEm: new Date().toISOString() });
        localStorage.setItem(MINHAS_COMPRAS_KEY, JSON.stringify(compras.slice(0, 50)));
      }
    }
    function openMinhasCompras(){
      toggleSidebar(false);
      const modal = document.getElementById("minhasComprasModal");
      const body = document.getElementById("minhasComprasBody");
      const compras = getMinhasComprasLocal();
      if(!body || !modal) return;
      if(!compras.length){
        body.innerHTML = `<div class="erro"><div><h1>Sem compras</h1><p>As compras feitas neste aparelho vão aparecer aqui.</p></div></div>`;
      } else {
        body.innerHTML = `<div class="local-orders-list">${compras.map(renderCompraLocal).join("")}</div><p class="admin-report-note">Essa lista fica salva só neste celular/computador. Cliente 1 não vê as compras do cliente 2.</p>`;
      }
      modal.classList.add("active");
    }
    function closeMinhasCompras(){ document.getElementById("minhasComprasModal")?.classList.remove("active"); }
    function renderCompraLocal(p){
      const itens = Array.isArray(p.itens) ? p.itens : [];
      const itensHtml = itens.length ? itens.map(i=>`<small>• ${escapeHtml(i.nome||"Produto")} ${i.tamanho?`Tam. ${escapeHtml(i.tamanho)} `:""}x${Number(i.quantidade||1)}</small>`).join("") : `<small>${escapeHtml(p.nome||"Pedido")}</small>`;
      return `<div class="local-order-card"><b>${escapeHtml(p.id||"Pedido")}</b>${itensHtml}<small>Total: R$ ${money(p.total||0)}</small><small>CEP: ${escapeHtml(p.cep||"-")}</small><small>Status local: Pendente</small></div>`;
    }
    async function atualizarStatusPedido(id,status){
      try{
        const res=await fetchComTempo(`${API_URL}/api/admin/pedidos/${encodeURIComponent(id)}/status`,{method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${adminToken}`},body:JSON.stringify({status})}, 15000);
        const data=await res.json();
        if(!data.ok) return notify(data.erro||"Erro ao atualizar status","error");
        adminPedidos=Array.isArray(data.pedidos)?data.pedidos:adminPedidos;
        renderAdmin();
        notify("Status atualizado.","success");
      }catch(err){ console.error(err); notify("Erro ao atualizar status.","error"); }
    }
    async function salvarLocalizacaoPedido(id){
      const el = document.getElementById(`localizacao_${id}`);
      const localizacaoEntrega = el ? el.value : "";
      try{
        const res=await fetchComTempo(`${API_URL}/api/admin/pedidos/${encodeURIComponent(id)}/localizacao`,{method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${adminToken}`},body:JSON.stringify({localizacaoEntrega})}, 15000);
        const data=await res.json();
        if(!data.ok) return notify(data.erro||"Erro ao salvar localização","error");
        adminPedidos=Array.isArray(data.pedidos)?data.pedidos:adminPedidos;
        renderAdmin();
        notify("Localização salva.","success");
      }catch(err){ console.error(err); notify("Erro ao salvar localização.","error"); }
    }

    function adminLogout(){ adminToken=""; localStorage.removeItem("jws_admin_token"); showAdminLogin(); }

    /* V103: slide de imagens do index principal */
    let heroSlideAtual = 0;
    let heroSlideTimer = null;

    function getHeroSlides() {
      return document.querySelectorAll(".hero-slide");
    }

    function getHeroDots() {
      return document.querySelectorAll("#heroDots button");
    }

    function updateHeroSlide() {
      const track = document.getElementById("heroTrack");
      const slides = getHeroSlides();
      const dots = getHeroDots();

      if (!track || slides.length === 0) return;

      if (heroSlideAtual < 0) heroSlideAtual = slides.length - 1;
      if (heroSlideAtual >= slides.length) heroSlideAtual = 0;

      track.style.transform = `translateX(-${heroSlideAtual * 100}%)`;

      dots.forEach((dot, index) => {
        dot.classList.toggle("active", index === heroSlideAtual);
      });
    }

    function goToHeroSlide(index) {
      heroSlideAtual = index;
      updateHeroSlide();
      restartHeroSlideAuto();
    }

    function nextHeroSlide() {
      const slides = getHeroSlides();
      if (slides.length === 0) return;
      heroSlideAtual = (heroSlideAtual + 1) % slides.length;
      updateHeroSlide();
    }

    function prevHeroSlide() {
      const slides = getHeroSlides();
      if (slides.length === 0) return;
      heroSlideAtual = (heroSlideAtual - 1 + slides.length) % slides.length;
      updateHeroSlide();
      restartHeroSlideAuto();
    }

    function startHeroSlideAuto() {
      stopHeroSlideAuto();
      heroSlideTimer = setInterval(nextHeroSlide, 4000);
    }

    function stopHeroSlideAuto() {
      if (heroSlideTimer) {
        clearInterval(heroSlideTimer);
        heroSlideTimer = null;
      }
    }

    function restartHeroSlideAuto() {
      stopHeroSlideAuto();
      startHeroSlideAuto();
    }

    function iniciarSlidePrincipal() {
      const slider = document.getElementById("heroSlider");
      if (!slider) return;

      updateHeroSlide();
      startHeroSlideAuto();

      slider.addEventListener("mouseenter", stopHeroSlideAuto);
      slider.addEventListener("mouseleave", startHeroSlideAuto);
      slider.addEventListener("touchstart", stopHeroSlideAuto, { passive: true });
      slider.addEventListener("touchend", startHeroSlideAuto, { passive: true });
    }

  </script>
</body>
