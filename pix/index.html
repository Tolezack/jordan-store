<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Pagamento Pix - Jordan Wear</title>

  <style>
    :root {
      --bg: #eeeeee;
      --text: #050505;
      --line: #cccccc;
      --green: #15934f;
      --red: #d63031;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
    }

    .pix-topbar {
      height: 82px;
      background: #f6f6f6;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .pix-back {
      position: absolute;
      left: 18px;
      color: #111;
      text-decoration: none;
      font-size: 36px;
      font-weight: 900;
      line-height: 1;
    }

    .pix-logo {
      color: #111;
      text-decoration: none;
      font-size: 19px;
      font-weight: 900;
      text-transform: lowercase;
      letter-spacing: -0.04em;
    }

    .pix-main {
      width: min(980px, calc(100% - 24px));
      margin: 28px auto 60px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }

    .pix-card {
      background: #fff;
      border: 1px solid var(--line);
      padding: 22px;
    }

    .pix-card h1 {
      font-size: clamp(32px, 5vw, 52px);
      line-height: 0.95;
      text-transform: uppercase;
      letter-spacing: -0.06em;
      margin-bottom: 16px;
    }

    .pix-card p {
      color: #555;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .pedido-box {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line);
      background: #f7f7f7;
      padding: 12px;
      margin-bottom: 16px;
    }

    .pedido-box img {
      width: 86px;
      height: 106px;
      object-fit: cover;
      background: #ddd;
    }

    .pedido-box b {
      display: block;
      text-transform: uppercase;
      line-height: 1.2;
      margin-bottom: 5px;
    }

    .pedido-box small {
      color: #666;
      display: block;
      margin-top: 3px;
    }

    .valores {
      border-top: 1px solid var(--line);
      margin-top: 16px;
      padding-top: 16px;
      display: grid;
      gap: 8px;
    }

    .linha-valor {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: #555;
    }

    .linha-valor strong {
      color: #111;
    }

    .total {
      border-top: 1px solid var(--line);
      margin-top: 10px;
      padding-top: 14px;
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -0.05em;
      display: flex;
      justify-content: space-between;
      gap: 14px;
    }

    .pix-chave {
      background: #f7f7f7;
      border: 1px solid var(--line);
      padding: 14px;
      word-break: break-all;
      font-size: 14px;
      margin: 12px 0;
    }

    .qr-box {
      display: grid;
      place-items: center;
      background: #f7f7f7;
      border: 1px solid var(--line);
      padding: 16px;
      margin-bottom: 12px;
    }

    .qr-box img {
      width: 260px;
      max-width: 100%;
      image-rendering: crisp-edges;
    }

    .pix-code {
      width: 100%;
      min-height: 150px;
      border: 1px solid var(--line);
      background: #f7f7f7;
      padding: 14px;
      resize: none;
      outline: 0;
      font-size: 13px;
      line-height: 1.5;
    }

    .btn {
      width: 100%;
      min-height: 52px;
      background: #111;
      color: #fff;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 10px;
    }

    .btn.whats {
      background: var(--green);
    }

    .btn:disabled,
    .upload-comprovante-btn.disabled {
      background: #cfcfcf !important;
      color: #777 !important;
      cursor: not-allowed !important;
      pointer-events: none;
    }

    .anti-spam-note {
      margin-top: 8px;
      font-size: 12px;
      color: #777;
      line-height: 1.4;
    }

    .aviso {
      margin-top: 12px;
      font-size: 13px;
      color: #666;
    }

    .comprovante-box {
      border-top: 1px solid var(--line);
      margin-top: 14px;
      padding-top: 14px;
    }

    .comprovante-box label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: 0.08em;
      margin-bottom: 7px;
    }

    .comprovante-box input {
      width: 100%;
      height: 50px;
      border: 1px solid var(--line);
      background: #f7f7f7;
      padding: 0 12px;
      outline: 0;
      font-weight: 700;
    }

    .comprovante-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .upload-comprovante-btn {
      min-height: 52px;
      display: grid;
      place-items: center;
      background: #f7f7f7;
      color: #111;
      border: 1px solid var(--line);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
    }

    .upload-comprovante-btn input {
      display: none;
    }

    .comprovante-preview {
      display: none;
      margin-top: 10px;
      border: 1px solid var(--line);
      background: #f7f7f7;
      padding: 10px;
      gap: 10px;
      grid-template-columns: 70px 1fr;
      align-items: center;
    }

    .comprovante-preview.show {
      display: grid;
    }

    .comprovante-preview img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      background: #ddd;
      border: 1px solid var(--line);
    }

    .comprovante-preview strong {
      display: block;
      font-size: 13px;
      text-transform: uppercase;
    }

    .comprovante-preview small {
      display: block;
      margin-top: 4px;
      color: #666;
      line-height: 1.4;
    }

    .ok-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 18px;
    }

    .ok-overlay.show {
      display: flex;
    }

    .ok-modal {
      width: min(420px, 100%);
      background: #fff;
      border: 2px solid #111;
      padding: 24px;
      box-shadow: 10px 10px 0 #111;
      text-align: center;
    }

    .ok-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 14px;
      background: var(--green);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 40px;
      font-weight: 900;
    }

    .ok-modal h2 {
      font-size: 30px;
      text-transform: uppercase;
      letter-spacing: -0.05em;
      margin-bottom: 8px;
    }

    .ok-modal p {
      color: #555;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .ok-modal button {
      width: 100%;
      min-height: 52px;
      background: #111;
      color: #fff;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .pedido-backend-status {
      margin-top: 10px;
      font-size: 13px;
      color: #555;
      line-height: 1.5;
    }

    .erro {
      grid-column: 1 / -1;
      background: #fff;
      border: 1px solid var(--line);
      padding: 30px;
      text-align: center;
    }

    .erro h1 {
      font-size: 34px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .erro a {
      display: inline-flex;
      margin-top: 16px;
      background: #111;
      color: #fff;
      text-decoration: none;
      padding: 14px 18px;
      font-weight: 900;
      text-transform: uppercase;
    }

    @media (max-width: 760px) {
      .pix-main {
        grid-template-columns: 1fr;
        margin-top: 16px;
      }

      .pix-card {
        padding: 18px;
      }

      .total {
        font-size: 30px;
      }

      .comprovante-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header class="pix-topbar">
    <a href="../index.html" class="pix-back">‹</a>
    <a href="../index.html" class="pix-logo">jordanwear</a>
  </header>

  <main class="pix-main" id="pixMain"></main>

  <script>
    /*
      IMPORTANTE:
      - PIX_CHAVE: sua chave Pix.
      - Se for CPF, coloca os 11 números. Ex: "05056667003"
      - PIX_CIDADE: cidade da conta Pix/loja, sem acento e curta.
        Não coloca "Rio Grande do Sul", porque isso é estado.
        Ex: "PORTO ALEGRE", "CANOAS", "GRAVATAI", "VIAMAO"
    */

    const PIX_CHAVE = "05050667003";
    const PIX_NOME = "JORDAN";
    const PIX_CIDADE = "IVOTI";
    const WHATSAPP_LOJA = "556993306882";
    const API_URL = "https://jordan-store-backend.onrender.com".replace(/\/$/, "");

    let pedidoAtual = null;
    let pixCodeAtual = "";
    let comprovanteImagemBase64 = "";
    let comprovanteArquivoNome = "";
    let enviandoPedidoBackend = false;
    let enviandoComprovante = false;

    const PEDIDO_COOLDOWN_MS = 15000;
    const COMPROVANTE_COOLDOWN_MS = 45000;

    function numero(valor) {
      const n = Number(valor);
      return Number.isFinite(n) ? n : 0;
    }

    function money(valor) {
      return numero(valor).toFixed(2).replace(".", ",");
    }

    function limparTextoPix(texto, limite) {
      return String(texto || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^A-Za-z0-9 ]/g, "")
        .trim()
        .substring(0, limite)
        .toUpperCase();
    }

    function montarCampo(id, valor) {
      const texto = String(valor || "");
      const tamanho = String(texto.length).padStart(2, "0");
      return `${id}${tamanho}${texto}`;
    }

    function crc16(payload) {
      let crc = 0xffff;

      for (let i = 0; i < payload.length; i++) {
        crc ^= payload.charCodeAt(i) << 8;

        for (let j = 0; j < 8; j++) {
          if ((crc & 0x8000) !== 0) {
            crc = (crc << 1) ^ 0x1021;
          } else {
            crc = crc << 1;
          }

          crc &= 0xffff;
        }
      }

      return crc.toString(16).toUpperCase().padStart(4, "0");
    }

    function gerarPixCopiaCola({ chave, nome, cidade, valor, pedidoId }) {
      const valorFormatado = numero(valor).toFixed(2);

      const gui = montarCampo("00", "br.gov.bcb.pix");
      const chavePix = montarCampo("01", String(chave).trim());
      const merchantAccountInfo = montarCampo("26", gui + chavePix);

      const payloadSemCRC =
        montarCampo("00", "01") +
        merchantAccountInfo +
        montarCampo("52", "0000") +
        montarCampo("53", "986") +
        montarCampo("54", valorFormatado) +
        montarCampo("58", "BR") +
        montarCampo("59", limparTextoPix(nome, 25)) +
        montarCampo("60", limparTextoPix(cidade, 15)) +
        montarCampo("62", montarCampo("05", limparTextoPix(pedidoId || "PEDIDO", 25))) +
        "6304";

      return payloadSemCRC + crc16(payloadSemCRC);
    }

    function calcularSubtotalPedido(pedido) {
      if (Array.isArray(pedido.itens) && pedido.itens.length > 0) {
        return pedido.itens.reduce((total, item) => {
          const preco = numero(item.preco);
          const quantidade = Math.max(1, numero(item.quantidade || 1));
          return total + preco * quantidade;
        }, 0);
      }

      const preco = numero(pedido.preco);
      const quantidade = Math.max(1, numero(pedido.quantidade || 1));

      if (preco > 0) {
        return preco * quantidade;
      }

      return numero(pedido.subtotal || pedido.total);
    }

    function normalizarPedido(pedido) {
      const subtotal = calcularSubtotalPedido(pedido);
      const frete = pedido.frete === null || pedido.frete === undefined ? 0 : numero(pedido.frete);
      const total = subtotal + frete;

      return {
        ...pedido,
        id: pedido.id || `PED-${Date.now()}`,
        nome: pedido.nome || "Pedido Jordan Wear",
        subtotal,
        frete,
        total
      };
    }

    function getImagemPedido(pedido) {
      if (pedido.imagem) return pedido.imagem;

      if (Array.isArray(pedido.itens) && pedido.itens.length > 0) {
        return pedido.itens[0].imagem || pedido.itens[0].foto || "";
      }

      return "";
    }

    function getListaItensHTML(pedido) {
      if (Array.isArray(pedido.itens) && pedido.itens.length > 0) {
        return pedido.itens.map(item => {
          const nome = item.nome || "Produto";
          const quantidade = item.quantidade || 1;
          const tamanho = item.tamanho ? ` - Tam. ${item.tamanho}` : "";
          const preco = item.preco ? ` - R$ ${money(item.preco)}` : "";

          return `<small>${nome}${tamanho} x${quantidade}${preco}</small>`;
        }).join("");
      }

      const nome = pedido.nome || "Produto";
      const quantidade = pedido.quantidade || 1;
      const tamanho = pedido.tamanho ? ` - Tam. ${pedido.tamanho}` : "";
      const preco = pedido.preco ? ` - R$ ${money(pedido.preco)}` : "";

      return `<small>${nome}${tamanho} x${quantidade}${preco}</small>`;
    }

    function getListaItensWhatsApp(pedido) {
      if (Array.isArray(pedido.itens) && pedido.itens.length > 0) {
        return pedido.itens.map(item => {
          const nome = item.nome || "Produto";
          const quantidade = item.quantidade || 1;
          const tamanho = item.tamanho ? ` - Tam. ${item.tamanho}` : "";
          const preco = item.preco ? ` - R$ ${money(item.preco)}` : "";

          return `- ${nome}${tamanho} x${quantidade}${preco}`;
        }).join("%0A");
      }

      const nome = pedido.nome || "Produto";
      const quantidade = pedido.quantidade || 1;
      const tamanho = pedido.tamanho ? ` - Tam. ${pedido.tamanho}` : "";
      const preco = pedido.preco ? ` - R$ ${money(pedido.preco)}` : "";

      return `- ${nome}${tamanho} x${quantidade}${preco}`;
    }

    function agoraMs() {
      return Date.now();
    }

    function getAntiSpamKey(tipo) {
      const id = pedidoAtual && pedidoAtual.id ? pedidoAtual.id : "sem-pedido";
      return `${tipo}_${id}`;
    }

    function tempoRestanteCooldown(chave, cooldownMs) {
      const ultimo = Number(localStorage.getItem(chave) || 0);
      const restante = cooldownMs - (agoraMs() - ultimo);
      return Math.max(0, restante);
    }

    function iniciarCooldown(chave) {
      localStorage.setItem(chave, String(agoraMs()));
    }

    function segundos(ms) {
      return Math.ceil(ms / 1000);
    }

    function setBotaoComprovanteTravado(travado, texto) {
      const btn = document.getElementById("btnEnviarComprovante");
      const upload = document.getElementById("uploadComprovanteBtn");

      if (btn) {
        btn.disabled = !!travado;
        btn.textContent = texto || (travado ? "Aguarde..." : "Enviar comprovante");
      }

      if (upload) {
        upload.classList.toggle("disabled", !!travado);
      }
    }

    async function criarPedidoPendenteNoBackend() {
      if (!pedidoAtual || !pedidoAtual.id) return;
      if (enviandoPedidoBackend) return;

      const chaveCriado = `pedido_backend_criado_${pedidoAtual.id}`;
      const chaveCooldown = getAntiSpamKey("pedido_backend_ultimo_envio");
      const statusEl = document.getElementById("pedidoBackendStatus");

      if (localStorage.getItem(chaveCriado) === "sim") {
        if (statusEl) statusEl.textContent = "Pedido pendente já enviado.";
        return;
      }

      const restante = tempoRestanteCooldown(chaveCooldown, PEDIDO_COOLDOWN_MS);
      if (restante > 0) {
        if (statusEl) statusEl.textContent = `Anti-spam: aguarde ${segundos(restante)}s para reenviar o pedido.`;
        return;
      }

      enviandoPedidoBackend = true;
      iniciarCooldown(chaveCooldown);

      try {
        if (statusEl) statusEl.textContent = "Enviando pedido...";

        const res = await fetch(`${API_URL}/api/pedidos`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pedido: pedidoAtual })
        });

        const data = await res.json();

        if (!data.ok) throw new Error(data.erro || "Erro ao criar pedido");

        localStorage.setItem(chaveCriado, "sim");
        if (statusEl) statusEl.textContent = "Pedido pendente enviado.";
      } catch (err) {
        console.error(err);
        if (statusEl) statusEl.textContent = "Não consegui enviar o pedido para o painel. Tente novamente em alguns segundos.";
      } finally {
        enviandoPedidoBackend = false;
      }
    }

    function mostrarOkCustomizado(titulo, mensagem) {
      let overlay = document.getElementById("okOverlay");

      if (!overlay) {
        overlay = document.createElement("div");
        overlay.id = "okOverlay";
        overlay.className = "ok-overlay";
        document.body.appendChild(overlay);
      }

      overlay.innerHTML = `
        <div class="ok-modal">
          <div class="ok-icon">✓</div>
          <h2>${titulo}</h2>
          <p>${mensagem}</p>
          <button onclick="fecharOkCustomizado()">OK</button>
        </div>
      `;

      overlay.classList.add("show");
    }

    function fecharOkCustomizado() {
      const overlay = document.getElementById("okOverlay");
      if (overlay) overlay.classList.remove("show");
    }

    function atualizarPreviewComprovante() {
      const box = document.getElementById("comprovantePreview");
      const img = document.getElementById("comprovantePreviewImg");
      const nome = document.getElementById("comprovantePreviewNome");

      if (!box || !img || !nome) return;

      if (!comprovanteImagemBase64) {
        box.classList.remove("show");
        return;
      }

      img.src = comprovanteImagemBase64;
      nome.textContent = comprovanteArquivoNome || "Imagem selecionada";
      box.classList.add("show");
    }

    function compactarImagemComprovante(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => {
          const img = new Image();

          img.onload = () => {
            const maxSize = 900;
            let width = img.width;
            let height = img.height;

            if (width > height && width > maxSize) {
              height = Math.round(height * (maxSize / width));
              width = maxSize;
            } else if (height > maxSize) {
              width = Math.round(width * (maxSize / height));
              height = maxSize;
            }

            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, width, height);
            ctx.drawImage(img, 0, 0, width, height);

            resolve(canvas.toDataURL("image/jpeg", 0.72));
          };

          img.onerror = reject;
          img.src = reader.result;
        };

        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function escolherImagemComprovante(input) {
      const statusEl = document.getElementById("pedidoBackendStatus");
      const file = input.files && input.files[0];

      if (!file) return;

      if (!file.type.startsWith("image/")) {
        mostrarOkCustomizado("Arquivo inválido", "Escolha uma imagem do comprovante, tipo PNG, JPG ou JPEG.");
        input.value = "";
        return;
      }

      try {
        if (statusEl) statusEl.textContent = "Carregando imagem do comprovante...";

        comprovanteArquivoNome = file.name || "comprovante.jpg";
        comprovanteImagemBase64 = await compactarImagemComprovante(file);
        atualizarPreviewComprovante();

        if (statusEl) statusEl.textContent = "Imagem carregada. Clique em enviar comprovante.";
      } catch (err) {
        console.error(err);
        comprovanteImagemBase64 = "";
        comprovanteArquivoNome = "";
        atualizarPreviewComprovante();
        if (statusEl) statusEl.textContent = "Não consegui carregar essa imagem.";
      }
    }

    async function enviarComprovante() {
      if (!pedidoAtual || !pedidoAtual.id) return;
      if (enviandoComprovante) return;

      if (enviandoPedidoBackend) {
        mostrarOkCustomizado("Aguarde", "O pedido ainda está sendo enviado para o painel. Tente de novo em alguns segundos.");
        return;
      }

      const input = document.getElementById("comprovanteLink");
      const statusEl = document.getElementById("pedidoBackendStatus");
      const link = String(input?.value || "").trim();
      const chaveEnviado = `comprovante_enviado_${pedidoAtual.id}`;
      const chaveCooldown = getAntiSpamKey("comprovante_ultimo_envio");

      if (!link && !comprovanteImagemBase64) {
        mostrarOkCustomizado("Falta comprovante", "Cole um link ou coloque uma imagem do comprovante antes de enviar.");
        return;
      }

      if (localStorage.getItem(chaveEnviado) === "sim") {
        mostrarOkCustomizado("Já enviado", "Esse comprovante já foi enviado para a loja. Aguarde a confirmação.");
        if (statusEl) statusEl.textContent = "Comprovante já enviado. Aguarde a loja aprovar ou recusar.";
        setBotaoComprovanteTravado(true, "Comprovante enviado");
        return;
      }

      const restante = tempoRestanteCooldown(chaveCooldown, COMPROVANTE_COOLDOWN_MS);
      if (restante > 0) {
        mostrarOkCustomizado("Aguarde", `Para evitar spam, espere ${segundos(restante)} segundos antes de enviar de novo.`);
        if (statusEl) statusEl.textContent = `Anti-spam ativo. Aguarde ${segundos(restante)}s.`;
        return;
      }

      enviandoComprovante = true;
      iniciarCooldown(chaveCooldown);
      setBotaoComprovanteTravado(true, "Enviando...");

      try {
        if (statusEl) statusEl.textContent = "Enviando comprovante para a loja...";

        await criarPedidoPendenteNoBackend();

        const res = await fetch(`${API_URL}/api/pedidos/${encodeURIComponent(pedidoAtual.id)}/comprovante`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            comprovanteLink: link,
            comprovanteImagem: comprovanteImagemBase64,
            comprovanteArquivoNome
          })
        });

        const data = await res.json();

        if (!data.ok) throw new Error(data.erro || "Erro ao enviar comprovante");

        pedidoAtual.comprovanteLink = link;
        pedidoAtual.comprovanteImagem = comprovanteImagemBase64;
        pedidoAtual.comprovanteArquivoNome = comprovanteArquivoNome;
        pedidoAtual.status = "pendente";
        pedidoAtual.comprovanteEnviadoEm = new Date().toISOString();
        localStorage.setItem("pedido_pix_manual", JSON.stringify(pedidoAtual));
        localStorage.setItem(chaveEnviado, "sim");

        if (statusEl) statusEl.textContent = "Comprovante enviado. Aguarde a confirmação da loja.";
        setBotaoComprovanteTravado(true, "Comprovante enviado");
        mostrarOkCustomizado("Enviado", "Comprovante enviado para a loja. Seu pedido ficou pendente até ser aprovado.");
      } catch (err) {
        console.error(err);
        localStorage.removeItem(chaveEnviado);
        if (statusEl) statusEl.textContent = "Erro ao enviar comprovante. Confira se o backend está online.";
        setBotaoComprovanteTravado(false, "Enviar comprovante");
        mostrarOkCustomizado("Erro", "Não consegui enviar o comprovante agora. Tente de novo em alguns segundos.");
      } finally {
        enviandoComprovante = false;
      }
    }

    function abrirWhatsApp() {
      const p = pedidoAtual;
      const itens = getListaItensWhatsApp(p);

      const texto =
        `Olá, fiz um pedido na Jordan Wear.%0A%0A` +
        `Pedido: ${p.id}%0A` +
        `${itens}%0A%0A` +
        `Subtotal: R$ ${money(p.subtotal)}%0A` +
        `Frete: ${numero(p.frete) === 0 ? "Grátis" : `R$ ${money(p.frete)}`}%0A` +
        `Total: R$ ${money(p.total)}%0A` +
        `${p.cep ? `CEP: ${p.cep}%0A` : ""}` +
        `${p.enderecoFrete ? `Cidade: ${p.enderecoFrete.cidade}/${p.enderecoFrete.uf}%0A` : ""}` +
        `%0AVou enviar o comprovante do Pix.`;

      window.open(`https://wa.me/${WHATSAPP_LOJA}?text=${texto}`, "_blank");
    }

    async function copiarPix() {
      const campo = document.getElementById("pixCode");

      if (!campo || !campo.value) return;

      try {
        await navigator.clipboard.writeText(campo.value);
      } catch (err) {
        campo.select();
        campo.setSelectionRange(0, 99999);
        document.execCommand("copy");
      }

      const btn = document.getElementById("copyBtn");
      btn.textContent = "Pix copiado";

      setTimeout(() => {
        btn.textContent = "Copiar Pix";
      }, 1600);
    }

    function renderPix() {
      const main = document.getElementById("pixMain");
      const p = pedidoAtual;

      pixCodeAtual = gerarPixCopiaCola({
        chave: PIX_CHAVE,
        nome: PIX_NOME,
        cidade: PIX_CIDADE,
        valor: p.total,
        pedidoId: p.id
      });

      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=${encodeURIComponent(pixCodeAtual)}`;
      const imagem = getImagemPedido(p) || "https://via.placeholder.com/200";
      const listaItens = getListaItensHTML(p);
      comprovanteImagemBase64 = p.comprovanteImagem || comprovanteImagemBase64 || "";
      comprovanteArquivoNome = p.comprovanteArquivoNome || comprovanteArquivoNome || "";

      main.innerHTML = `
        <section class="pix-card">
          <h1>Pagamento Pix</h1>

          <p>
            Escaneie o QR Code ou copie o Pix. Depois envie o comprovante no WhatsApp.
          </p>

          <div class="pedido-box">
            <img src="${imagem}" alt="Produto" />

            <div>
              <b>${p.nome || "Pedido"}</b>
              ${listaItens}
              <small>Pedido: ${p.id}</small>
              ${p.enderecoFrete ? `<small>Entrega: ${p.enderecoFrete.cidade}/${p.enderecoFrete.uf}</small>` : ""}
              ${p.cep ? `<small>CEP: ${p.cep}</small>` : ""}
            </div>
          </div>

          <div class="valores">
            <div class="linha-valor">
              <span>Subtotal</span>
              <strong>R$ ${money(p.subtotal)}</strong>
            </div>

            <div class="linha-valor">
              <span>Frete</span>
              <strong>${numero(p.frete) === 0 ? "Grátis" : `R$ ${money(p.frete)}`}</strong>
            </div>

            <div class="total">
              <span>Total</span>
              <strong>R$ ${money(p.total)}</strong>
            </div>
          </div>
        </section>

        <section class="pix-card">
          <h1>QR Code Pix</h1>

          <div class="qr-box">
            <img src="${qrUrl}" alt="QR Code Pix" />
          </div>

          <p>Chave Pix:</p>

          <div class="pix-chave">
            ${PIX_CHAVE}
          </div>

          <textarea class="pix-code" id="pixCode" readonly>${pixCodeAtual}</textarea>

          <button class="btn" id="copyBtn" onclick="copiarPix()">
            Copiar Pix
          </button>

          <div class="comprovante-box">
            <label>Comprovante do Pix *</label>
            <input id="comprovanteLink" placeholder="Cole o link do comprovante, se tiver" value="${p.comprovanteLink || ""}" />

            <div class="comprovante-actions">
              <label class="upload-comprovante-btn" id="uploadComprovanteBtn">
                Colocar imagem
                <input type="file" accept="image/*" onchange="escolherImagemComprovante(this)" />
              </label>

              <button class="btn" id="btnEnviarComprovante" onclick="enviarComprovante()">
                Enviar comprovante
              </button>
            </div>

            <div class="comprovante-preview ${p.comprovanteImagem ? "show" : ""}" id="comprovantePreview">
              <img id="comprovantePreviewImg" src="${p.comprovanteImagem || ""}" alt="Comprovante" />
              <div>
                <strong>Imagem pronta</strong>
                <small id="comprovantePreviewNome">${p.comprovanteArquivoNome || "Comprovante selecionado"}</small>
              </div>
            </div>

            <div class="pedido-backend-status" id="pedidoBackendStatus">
              Enviando pedido...
            </div>

            <div class="anti-spam-note">
              Anti-spam ativo: o pedido não é duplicado e o comprovante só pode ser enviado uma vez.
            </div>
          </div>

          <button class="btn whats" onclick="abrirWhatsApp()">
            Abrir WhatsApp da loja
          </button>

          <p class="aviso">
            Esse pagamento é manual. O pedido fica pendente e será confirmado depois que o comprovante for conferido.
          </p>
        </section>
      `;
    }

    function carregarPix() {
      const main = document.getElementById("pixMain");

      let pedido = null;

      try {
        pedido = JSON.parse(localStorage.getItem("pedido_pix_manual") || "null");
      } catch (err) {
        pedido = null;
      }

      if (!pedido) {
        main.innerHTML = `
          <div class="erro">
            <div>
              <h1>Nenhum pedido encontrado</h1>
              <p>Volte para a loja e escolha um produto.</p>
              <a href="../index.html">Voltar para loja</a>
            </div>
          </div>
        `;
        return;
      }

      pedidoAtual = normalizarPedido(pedido);

      localStorage.setItem("pedido_pix_manual", JSON.stringify(pedidoAtual));

      renderPix();

      if (localStorage.getItem(`comprovante_enviado_${pedidoAtual.id}`) === "sim") {
        setTimeout(() => setBotaoComprovanteTravado(true, "Comprovante enviado"), 50);
      }

      criarPedidoPendenteNoBackend();
    }

    carregarPix();
  </script>
</body>
</html>
