<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamento Pix - Jordan Wear</title>
  <style>
    :root{--bg:#eeeeee;--text:#050505;--line:#cccccc;--muted:#666;--black:#000;--white:#fff;--green:#15934f;--red:#e01818}
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}button,input,textarea{font:inherit}button{cursor:pointer;border:0}.pix-top{height:82px;background:#f6f6f6;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:center;position:sticky;top:0;z-index:10}.pix-back{position:absolute;left:18px;color:#111;text-decoration:none;font-size:36px;font-weight:900}.pix-logo{font-weight:900;text-transform:lowercase;font-size:19px}.pix-main{width:min(860px,calc(100% - 24px));margin:28px auto 60px}.pix-card{background:#fff;border:1px solid var(--line);padding:28px}.pix-card h1{font-size:clamp(34px,7vw,64px);line-height:.95;text-transform:uppercase;letter-spacing:-.06em}.pix-card p{color:#444;line-height:1.6;margin-top:12px}.pix-total{margin:24px 0;padding:20px;background:#111;color:#fff}.pix-total span{display:block;font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:#ccc}.pix-total strong{font-size:42px}.pix-key{margin-top:18px}.pix-key label{display:block;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}.pix-key textarea{width:100%;min-height:86px;border:1px solid var(--line);padding:14px;resize:none;background:#f8f8f8}.pix-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.pix-btn{min-height:52px;background:#111;color:#fff;font-weight:900;text-transform:uppercase;letter-spacing:.08em}.pix-btn.secondary{background:#fff;color:#111;border:1px solid #111}.pix-list{margin-top:22px;border-top:1px solid var(--line);padding-top:18px}.pix-list h2{font-size:22px;margin-bottom:12px}.pix-item{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid #eee}.pix-item span{color:#333}.pix-customer{margin-top:22px;border-top:1px solid var(--line);padding-top:18px}.pix-customer h2{font-size:22px;margin-bottom:12px}.pix-warn{background:#fff7dd;border:1px solid #e8cf86;padding:14px;margin-top:18px;color:#5f4300}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#111;color:#fff;padding:14px 18px;font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}@media(max-width:620px){.pix-card{padding:18px}.pix-actions{grid-template-columns:1fr}.pix-total strong{font-size:34px}.pix-item{display:block}.pix-item strong{display:block;margin-top:4px}}
  </style>
</head>
<body>
  <header class="pix-top">
    <a class="pix-back" href="../index.html">‹</a>
    <div class="pix-logo">jordanwear</div>
  </header>

  <main class="pix-main">
    <section class="pix-card" id="pixView">
      <h1>Carregando Pix...</h1>
    </section>
  </main>

  <script>
    const PIX_CHAVE_PADRAO = "SUA_CHAVE_PIX_AQUI";
    const WHATSAPP_PADRAO = "5599999999999";

    function money(value){return Number(value||0).toFixed(2).replace('.', ',')}
    function esc(text){return String(text||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}
    function getPedidoId(){return new URLSearchParams(location.search).get('pedido') || localStorage.getItem('jws_ultimo_pedido') || ''}
    function carregarPedido(){
      const id=getPedidoId();
      if(!id) return null;
      try{return JSON.parse(localStorage.getItem(`jws_pedido_${id}`)||'null')}catch(e){return null}
    }
    function textoWhatsapp(pedido){
      const itens=(pedido.itens||[]).map(i=>`- ${i.nome} x${i.quantidade} = R$ ${money(Number(i.preco||0)*Number(i.quantidade||0))}`).join('%0A');
      return `Olá, fiz um pedido na Jordan Wear.%0A%0APedido: ${pedido.id}%0ATotal: R$ ${money(pedido.total)}%0A%0AItens:%0A${itens}%0A%0ANome: ${encodeURIComponent(pedido.cliente?.nome||'')}%0AWhatsApp: ${encodeURIComponent(pedido.cliente?.telefone||'')}%0AEndereço: ${encodeURIComponent(pedido.cliente?.endereco||'')}%0A%0AVou enviar o comprovante do Pix.`;
    }
    function render(){
      const view=document.getElementById('pixView');
      const pedido=carregarPedido();
      if(!pedido){
        view.innerHTML=`<h1>Pedido não encontrado</h1><p>Volte para a loja e finalize o carrinho de novo.</p><div class="pix-actions"><a class="pix-btn secondary" style="display:grid;place-items:center;text-decoration:none" href="../index.html">Voltar para loja</a></div>`;
        return;
      }
      const chave=pedido.pixChave || PIX_CHAVE_PADRAO;
      const whats=pedido.whatsappLoja || WHATSAPP_PADRAO;
      const linkWhats=`https://wa.me/${whats}?text=${textoWhatsapp(pedido)}`;
      view.innerHTML=`
        <h1>Pagamento Pix</h1>
        <p>Pedido <b>${esc(pedido.id)}</b>. Copie a chave Pix, pague no app do banco e depois envie o comprovante pelo WhatsApp.</p>
        <div class="pix-total"><span>Total do pedido</span><strong>R$ ${money(pedido.total)}</strong></div>
        <div class="pix-key"><label>Chave Pix</label><textarea id="pixKey" readonly>${esc(chave)}</textarea></div>
        <div class="pix-actions">
          <button class="pix-btn" onclick="copyPix()">Copiar Pix</button>
          <a class="pix-btn secondary" style="display:grid;place-items:center;text-decoration:none" href="${linkWhats}" target="_blank">Enviar comprovante</a>
        </div>
        <div class="pix-warn"><b>Atenção:</b> o estoque só é separado depois que você enviar o comprovante e a loja confirmar o pagamento.</div>
        <div class="pix-list"><h2>Itens</h2>${(pedido.itens||[]).map(i=>`<div class="pix-item"><span>${esc(i.nome)} x${i.quantidade}</span><strong>R$ ${money(Number(i.preco||0)*Number(i.quantidade||0))}</strong></div>`).join('')}<div class="pix-item"><span>Frete</span><strong>${Number(pedido.frete||0)===0?'Grátis':'R$ '+money(pedido.frete)}</strong></div></div>
        <div class="pix-customer"><h2>Dados</h2><p><b>Nome:</b> ${esc(pedido.cliente?.nome||'')}</p><p><b>WhatsApp:</b> ${esc(pedido.cliente?.telefone||'')}</p><p><b>Endereço:</b> ${esc(pedido.cliente?.endereco||'')}</p></div>
      `;
    }
    function copyPix(){
      const text=document.getElementById('pixKey')?.value||'';
      navigator.clipboard.writeText(text);
      toast('Pix copiado');
    }
    function toast(text){const old=document.querySelector('.toast'); if(old)old.remove(); const el=document.createElement('div'); el.className='toast'; el.textContent=text; document.body.appendChild(el); setTimeout(()=>el.remove(),2200)}
    render();
  </script>
</body>
</html>
