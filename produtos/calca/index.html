<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produto - Jordan Wear</title>
  <style>
    :root{--bg:#eee;--text:#050505;--line:#ccc;--red:#e01818}*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}button{cursor:pointer;border:0;background:none;color:inherit;font:inherit}.produto-topbar{position:sticky;top:0;z-index:100;height:86px;background:#f6f6f6;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:center;padding:0 82px}.produto-voltar{position:absolute;left:18px;top:50%;transform:translateY(-50%);width:48px;height:48px;display:grid;place-items:center;color:#111;text-decoration:none;font-size:36px;font-weight:900}.produto-logo{color:#111;text-decoration:none;font-size:19px;font-weight:900;text-transform:lowercase}.produto-carrinho{position:absolute;right:18px;top:50%;transform:translateY(-50%);width:52px;height:52px;display:grid;place-items:center;text-decoration:none;font-size:0}.produto-carrinho img{width:36px;height:36px;object-fit:contain}.produto-carrinho span{position:absolute;top:1px;right:0;min-width:21px;height:21px;border-radius:999px;background:#111;color:#fff;display:grid;place-items:center;font-size:11px;font-weight:900}.produto-main{width:min(1180px,calc(100% - 28px));margin:26px auto 60px}.produto-shell{display:grid;grid-template-columns:minmax(0,1fr) minmax(360px,.85fr);gap:34px;align-items:start}.produto-loading,.produto-erro{min-height:360px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;text-align:center;padding:28px}.produto-erro h1{font-size:38px;text-transform:uppercase}.produto-erro a{margin-top:18px;display:inline-flex;background:#111;color:#fff;text-decoration:none;padding:14px 18px;font-weight:900;text-transform:uppercase}.produto-foto-box{position:relative;width:100%;background:#dfdfdf;border:1px solid var(--line);overflow:hidden}.produto-foto-box img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block}.foto-count{position:absolute;left:14px;bottom:14px;background:rgba(0,0,0,.82);color:#fff;padding:8px 12px;font-size:12px;font-weight:900}.foto-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:3;width:46px;height:60px;background:rgba(255,255,255,.85);border:1px solid rgba(0,0,0,.18);font-size:42px;display:grid;place-items:center}.foto-prev{left:10px}.foto-next{right:10px}.produto-thumbs{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:10px}.produto-thumbs button{background:#fff;border:1px solid #d0d0d0;overflow:hidden}.produto-thumbs button.active{border-color:#111;outline:2px solid #111}.produto-thumbs img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}.produto-info{padding-top:6px}.produto-breadcrumb{display:flex;flex-wrap:wrap;gap:8px;color:#777;font-size:15px;margin-bottom:12px}.produto-breadcrumb a{color:#777;text-decoration:none}.produto-info h1{font-size:clamp(38px,5vw,66px);line-height:.96;letter-spacing:-.06em;text-transform:uppercase;margin-bottom:22px}.produto-preco{font-size:clamp(34px,4vw,54px);font-weight:900}.produto-pix{margin-top:8px;color:var(--red);font-size:clamp(20px,2.5vw,30px);font-weight:900}.produto-desc{margin:26px 0;color:#333;line-height:1.65}.produto-label{display:block;margin-bottom:10px;font-weight:700}.produto-tamanhos{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px}.produto-tamanhos button{min-width:76px;min-height:52px;border:1px solid #bcbcbc;background:#f7f7f7;display:grid;place-items:center;padding:6px 10px}.produto-tamanhos button span{font-size:11px;color:#666}.produto-tamanhos button.active{background:#111;color:#fff;border-color:#111}.produto-tamanhos button.active span{color:#ddd}.produto-tamanhos button.off{opacity:.38;cursor:not-allowed}.produto-compra-linha{display:grid;grid-template-columns:210px 1fr;gap:18px;margin-bottom:14px}.produto-quantidade{height:62px;border:1px solid #aaa;background:#eee;display:grid;grid-template-columns:1fr 1fr 1fr}.produto-quantidade button{font-size:34px;font-weight:900}.produto-quantidade span{display:grid;place-items:center;font-size:24px}.produto-comprar{height:62px;background:#000;color:#fff;font-size:15px;font-weight:900;text-transform:uppercase;letter-spacing:.22em}.produto-comprar.off{background:#d1d1d1;color:#777}.produto-estoque-info{color:#555;font-size:14px;margin-bottom:26px}.produto-detalhes-box{border-top:1px solid #cfcfcf;padding-top:20px}.produto-detalhes-box summary{font-size:22px;font-weight:900;cursor:pointer}.produto-detalhes-box p{margin-top:12px;color:#555;line-height:1.7}.add-animation{position:fixed;z-index:9999;width:80px;height:100px;object-fit:cover;border:1px solid #111;pointer-events:none;animation:flyToCart .75s ease-in forwards}@keyframes flyToCart{to{transform:translate(var(--x),var(--y)) scale(.15);opacity:.2}}.cart-pulse{animation:cartPulse .4s ease}@keyframes cartPulse{0%{transform:translateY(-50%) scale(1)}50%{transform:translateY(-50%) scale(1.18)}100%{transform:translateY(-50%) scale(1)}}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:9999;background:#111;color:#fff;padding:14px 18px;font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}@media(max-width:880px){.produto-topbar{height:76px;padding:0 76px}.produto-voltar{left:8px}.produto-carrinho{right:10px}.produto-main{width:100%;margin:0 auto 42px}.produto-shell{display:block}.produto-foto-box{border-left:0;border-right:0}.produto-foto-box img{aspect-ratio:4/5}.produto-thumbs{display:flex;overflow-x:auto;padding:10px 12px 0;gap:8px}.produto-thumbs button{min-width:72px}.produto-info{padding:18px 18px 0}.produto-info h1{font-size:42px}.produto-preco{font-size:42px}.produto-compra-linha{grid-template-columns:.85fr 1.65fr;gap:12px}.produto-quantidade,.produto-comprar{height:58px}}@media(max-width:480px){.produto-info{padding:16px 14px 0}.produto-info h1{font-size:34px}.produto-preco{font-size:36px}.produto-pix{font-size:21px}.produto-tamanhos button{min-width:62px}.produto-compra-linha{grid-template-columns:.75fr 1.6fr;gap:10px}.produto-comprar{font-size:13px;letter-spacing:.16em}}
  </style>
</head>
<body>
  <header class="produto-topbar"><a class="produto-voltar" href="../../index.html">‹</a><a class="produto-logo" href="../../index.html">jordanwear</a><a class="produto-carrinho" href="../../index.html#cart" id="cartIcon"><img src="../../Carrinho.svg" alt="Carrinho" onerror="this.style.display='none'" /><span id="cartCount">0</span></a></header>
  <main class="produto-main"><section id="produtoView"><div class="produto-loading"><p>Carregando produto...</p></div></section></main>
  <script>
    let produtoAtual=null, imagensProduto=[], imagemAtual=0, tamanhoSelecionado="", quantidade=1, autoSlideTimer=null;
    function money(v){return Number(v||0).toFixed(2).replace(".",",")}function getIdProduto(){return new URLSearchParams(location.search).get("id")}function normalizarTexto(t){return String(t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim()}function normalizarCategoria(c){const x=normalizarTexto(c);if(x.includes("camisa")||x.includes("camiseta"))return"camisa";if(x.includes("calca"))return"calca";if(x.includes("tenis")||x.includes("sapato"))return"tenis";if(x.includes("bermuda")||x.includes("short"))return"bermuda";if(x.includes("moletom")||x.includes("blusa"))return"moletom";return x||"camisa"}function normalizarTamanho(t){return String(t||"").trim().toUpperCase()}
    function getEstoqueTamanhos(produto){const estoque=produto.estoqueTamanhos||produto.estoque_tamanhos||produto.estoques||{};const limpo={};if(estoque&&typeof estoque==="object"&&!Array.isArray(estoque)){Object.entries(estoque).forEach(([t,q])=>{const tam=normalizarTamanho(t);if(tam)limpo[tam]=Number(q||0)})}return limpo}
    function getTamanhosProduto(produto){const e=getEstoqueTamanhos(produto), keys=Object.keys(e);if(keys.length)return keys;if(Array.isArray(produto.tamanhos)&&produto.tamanhos.length)return produto.tamanhos.map(normalizarTamanho).filter(Boolean);return["P","M","G","GG"]}
    function getEstoqueTotal(produto){const vals=Object.values(getEstoqueTamanhos(produto));if(vals.length)return vals.reduce((s,v)=>s+Number(v||0),0);return Number(produto.estoque||0)}
    function getEstoqueDoTamanho(tamanho){if(!produtoAtual)return 0;const e=getEstoqueTamanhos(produtoAtual), tam=normalizarTamanho(tamanho);if(Object.keys(e).length)return Number(e[tam]||0);return Number(produtoAtual.estoque||0)}
    function getFotosProduto(produto){const fotos=[];if(produto.imagem)fotos.push(String(produto.imagem).trim());if(Array.isArray(produto.imagens))produto.imagens.forEach(img=>{const f=String(img||"").trim();if(f&&!fotos.includes(f))fotos.push(f)});return fotos.filter(Boolean)}
    function atualizarContadorCarrinho(){const c=JSON.parse(localStorage.getItem("jws_cart")||"[]"), total=c.reduce((s,i)=>s+Number(i.quantidade||0),0);document.getElementById("cartCount").textContent=total}
    async function carregarProduto(){const view=document.getElementById("produtoView"), id=getIdProduto();try{const res=await fetch(`../../produtos.json?v=90`);if(!res.ok)throw new Error("produtos.json não encontrado");const data=await res.json(), produtos=Array.isArray(data)?data:data.produtos||[];produtoAtual=produtos.find(p=>String(p.id)===String(id));if(!produtoAtual){view.innerHTML=`<div class="produto-erro"><div><h1>Produto não encontrado</h1><p>Volte para a loja.</p><a href="../../index.html">Voltar</a></div></div>`;return}produtoAtual.preco=Number(produtoAtual.preco||0);produtoAtual.categoria=normalizarCategoria(produtoAtual.categoria);produtoAtual.estoque=getEstoqueTotal(produtoAtual);produtoAtual.tamanhos=getTamanhosProduto(produtoAtual);imagensProduto=getFotosProduto(produtoAtual);if(!imagensProduto.length)imagensProduto=["https://via.placeholder.com/900"];const primeiro=produtoAtual.tamanhos.find(t=>getEstoqueDoTamanho(t)>0);tamanhoSelecionado=primeiro||produtoAtual.tamanhos[0]||"P";quantidade=1;imagemAtual=0;document.title=`${produtoAtual.nome} - Jordan Wear`;renderProduto();atualizarContadorCarrinho();iniciarAutoSlide()}catch(err){console.error(err);view.innerHTML=`<div class="produto-erro"><div><h1>Erro ao carregar</h1><p>Verifique produtos.json.</p><a href="../../index.html">Voltar</a></div></div>`}}
    function renderProduto(){const view=document.getElementById("produtoView"), tamanhos=getTamanhosProduto(produtoAtual), estoqueSelecionado=getEstoqueDoTamanho(tamanhoSelecionado), img=imagensProduto[imagemAtual]||imagensProduto[0], total=getEstoqueTotal(produtoAtual);view.innerHTML=`<div class="produto-shell"><div class="produto-galeria"><div class="produto-foto-box">${imagensProduto.length>1?`<button class="foto-nav foto-prev" onclick="trocarImagem(-1)">‹</button>`:""}<img id="imagemPrincipal" src="${img}" alt="${produtoAtual.nome}" onerror="this.src='https://via.placeholder.com/900'" />${imagensProduto.length>1?`<button class="foto-nav foto-next" onclick="trocarImagem(1)">›</button>`:""}<div class="foto-count">${imagemAtual+1}/${imagensProduto.length}</div></div>${imagensProduto.length>1?`<div class="produto-thumbs">${imagensProduto.map((im,i)=>`<button class="${i===imagemAtual?"active":""}" onclick="setImagem(${i})"><img src="${im}" onerror="this.src='https://via.placeholder.com/160'" /></button>`).join("")}</div>`:""}</div><div class="produto-info"><div class="produto-breadcrumb"><a href="../../index.html">Início</a><span>›</span><a href="../../index.html">${produtoAtual.categoria}</a><span>›</span><span>${produtoAtual.nome}</span></div><h1>${produtoAtual.nome}</h1><div class="produto-preco">R$ ${money(produtoAtual.preco)}</div><div class="produto-pix">R$ ${money(produtoAtual.preco*.97)} com Pix</div><div class="produto-desc">${produtoAtual.descricao||"Produto selecionado da Jordan Wear Store."}</div><label class="produto-label">Tamanho</label><div class="produto-tamanhos">${tamanhos.map(t=>{const tam=normalizarTamanho(t), qtd=getEstoqueDoTamanho(tam), active=tam===tamanhoSelecionado?"active":"", off=qtd<=0?"off":"";return`<button class="${active} ${off}" onclick="selecionarTamanho('${tam}')" ${qtd<=0?"disabled":""}><strong>${tam}</strong><span>${qtd} un.</span></button>`}).join("")}</div><div class="produto-compra-linha"><div class="produto-quantidade"><button onclick="mudarQuantidade(-1)">−</button><span>${quantidade}</span><button onclick="mudarQuantidade(1)">+</button></div>${estoqueSelecionado>0?`<button class="produto-comprar" onclick="comprarProduto()">Adicionar</button>`:`<button class="produto-comprar off" disabled>Indisponível</button>`}</div><div class="produto-estoque-info">Estoque do tamanho ${tamanhoSelecionado}: <b>${estoqueSelecionado}</b> unidade(s)<br>Estoque total: <b>${total}</b> unidade(s)</div><details class="produto-detalhes-box" open><summary>Detalhes</summary><p>Produto vendido pela Jordan Wear Store. Pagamento via Pix. Pedido separado após confirmação.</p></details></div></div>`}
    function selecionarTamanho(t){tamanhoSelecionado=normalizarTamanho(t);quantidade=1;renderProduto()}function mudarQuantidade(v){const e=getEstoqueDoTamanho(tamanhoSelecionado), nova=quantidade+v;if(nova<1||nova>e)return;quantidade=nova;renderProduto()}function setImagem(i){imagemAtual=i;renderProduto();reiniciarAutoSlide()}function trocarImagem(d){if(!imagensProduto.length)return;imagemAtual+=d;if(imagemAtual<0)imagemAtual=imagensProduto.length-1;if(imagemAtual>=imagensProduto.length)imagemAtual=0;renderProduto();reiniciarAutoSlide()}function iniciarAutoSlide(){if(autoSlideTimer)clearInterval(autoSlideTimer);if(imagensProduto.length<=1)return;autoSlideTimer=setInterval(()=>{imagemAtual=(imagemAtual+1)%imagensProduto.length;renderProduto()},4500)}function reiniciarAutoSlide(){iniciarAutoSlide()}
    function comprarProduto(){if(!produtoAtual)return;const estoqueAtual=getEstoqueDoTamanho(tamanhoSelecionado);if(estoqueAtual<=0)return toast("Tamanho indisponível");if(quantidade>estoqueAtual)return toast("Quantidade maior que o estoque");const carrinho=JSON.parse(localStorage.getItem("jws_cart")||"[]"), cartId=`${produtoAtual.id}-${tamanhoSelecionado}`, item=carrinho.find(i=>i.cartId===cartId);if(item){const nova=Number(item.quantidade||0)+quantidade;if(nova>estoqueAtual)return toast("Quantidade máxima desse tamanho");item.quantidade=nova}else{carrinho.push({cartId,id:produtoAtual.id,nome:`${produtoAtual.nome} - Tam. ${tamanhoSelecionado}`,tamanho:tamanhoSelecionado,preco:produtoAtual.preco,imagem:imagensProduto[0]||produtoAtual.imagem||"",quantidade})}localStorage.setItem("jws_cart",JSON.stringify(carrinho));atualizarContadorCarrinho();animarCarrinho();toast("Adicionado ao carrinho")}
    function animarCarrinho(){const img=document.getElementById("imagemPrincipal"),cart=document.getElementById("cartIcon");if(!img||!cart)return;const ir=img.getBoundingClientRect(),cr=cart.getBoundingClientRect(),clone=document.createElement("img");clone.src=img.src;clone.className="add-animation";clone.style.left=`${ir.left}px`;clone.style.top=`${ir.top}px`;clone.style.setProperty("--x",`${cr.left-ir.left}px`);clone.style.setProperty("--y",`${cr.top-ir.top}px`);document.body.appendChild(clone);cart.classList.remove("cart-pulse");void cart.offsetWidth;cart.classList.add("cart-pulse");setTimeout(()=>clone.remove(),800)}function toast(texto){const antigo=document.querySelector(".toast");if(antigo)antigo.remove();const el=document.createElement("div");el.className="toast";el.textContent=texto;document.body.appendChild(el);setTimeout(()=>el.remove(),2300)}carregarProduto();
  </script>
</body>
</html>
