<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Produto - Jordan Wear</title>

  <link rel="stylesheet" href="../../style.css" />
</head>

<body class="product-page-body">
  <header class="product-header">
    <a href="../../index.html" class="product-back">← voltar</a>

    <img
      class="logo"
      src="https://i.pinimg.com/736x/97/20/a6/9720a60b3796f5660a5e12c771775a02.jpg"
      alt="Jordan Wear"
    />

    <a href="../../index.html" class="product-cart">
      🛒
      <span id="productCartCount">0</span>
    </a>
  </header>

  <main class="single-product-main">
    <section class="single-product" id="produtoView">
      <div class="loading">
        <div>
          <div class="spinner"></div>
          <p>Carregando produto...</p>
        </div>
      </div>
    </section>
  </main>

  <script>
    let produtoAtual = null;
    let quantidade = 1;
    let tamanhoSelecionado = "";

    function money(value) {
      return Number(value || 0).toFixed(2).replace(".", ",");
    }

    function getIdProduto() {
      return new URLSearchParams(location.search).get("id");
    }

    function normalizarCategoria(categoria) {
      const c = String(categoria || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();

      if (c.includes("camisa") || c.includes("camiseta")) return "camisa";
      if (c.includes("calca")) return "calca";
      if (c.includes("tenis") || c.includes("sapato")) return "tenis";

      return c || "camisa";
    }

    async function carregarProduto() {
      const view = document.getElementById("produtoView");
      const id = getIdProduto();

      try {
        const res = await fetch("../../produtos.json");

        if (!res.ok) {
          throw new Error("produtos.json não encontrado");
        }

        const data = await res.json();
        const produtos = Array.isArray(data) ? data : data.produtos || [];

        produtoAtual = produtos.find(p => String(p.id) === String(id));

        if (!produtoAtual) {
          view.innerHTML = `
            <div class="single-product-error">
              <h1>Produto não encontrado</h1>
              <p>Volte para a loja e escolha outro produto.</p>
              <a href="../../index.html">Voltar para loja</a>
            </div>
          `;
          return;
        }

        produtoAtual.preco = Number(produtoAtual.preco || 0);
        produtoAtual.estoque = Number(produtoAtual.estoque || 0);
        produtoAtual.categoria = normalizarCategoria(produtoAtual.categoria);
        produtoAtual.tamanhos = Array.isArray(produtoAtual.tamanhos) && produtoAtual.tamanhos.length
          ? produtoAtual.tamanhos
          : ["P", "M", "G", "GG"];

        tamanhoSelecionado = produtoAtual.tamanhos[0];

        document.title = `${produtoAtual.nome} - Jordan Wear`;

        renderProduto();
        atualizarContadorCarrinho();
      } catch (err) {
        console.error(err);

        view.innerHTML = `
          <div class="single-product-error">
            <h1>Erro ao carregar</h1>
            <p>Verifique se o produtos.json está na raiz do site.</p>
            <a href="../../index.html">Voltar para loja</a>
          </div>
        `;
      }
    }

    function renderProduto() {
      const view = document.getElementById("produtoView");

      const imagens = [
        produtoAtual.imagem,
        ...(Array.isArray(produtoAtual.imagens) ? produtoAtual.imagens : [])
      ].filter(Boolean);

      view.innerHTML = `
        <div class="single-gallery">
          <div class="single-main-image">
            <img
              id="mainProductImage"
              src="${imagens[0] || "https://via.placeholder.com/900"}"
              alt="${produtoAtual.nome}"
              onerror="this.src='https://via.placeholder.com/900'"
            />
          </div>

          ${
            imagens.length > 1
              ? `
                <div class="single-thumbs">
                  ${imagens.map((img, index) => `
                    <button class="${index === 0 ? "active" : ""}" onclick="trocarImagem('${img}', this)">
                      <img src="${img}" onerror="this.src='https://via.placeholder.com/160'" />
                    </button>
                  `).join("")}
                </div>
              `
              : ""
          }
        </div>

        <div class="single-info">
          <div class="breadcrumb">
            <a href="../../index.html">Início</a>
            <span>›</span>
            <a href="../../index.html">${produtoAtual.categoria}</a>
            <span>›</span>
            <span>${produtoAtual.nome}</span>
          </div>

          <h1>${produtoAtual.nome}</h1>

          <div class="single-price">
            R$ ${money(produtoAtual.preco)}
          </div>

          <p class="single-pix">
            R$ ${money(produtoAtual.preco * 0.97)} com Pix
          </p>

          <div class="single-description">
            ${produtoAtual.descricao || "Produto selecionado da Jordan Wear Store."}
          </div>

          <div class="single-field">
            <label>Tamanho</label>

            <select onchange="selecionarTamanho(this.value)">
              ${produtoAtual.tamanhos.map(t => `
                <option value="${t}" ${t === tamanhoSelecionado ? "selected" : ""}>${t}</option>
              `).join("")}
            </select>
          </div>

          <div class="single-buy-row">
            <div class="qty-box">
              <button onclick="mudarQuantidade(-1)">−</button>
              <span id="qtyText">${quantidade}</span>
              <button onclick="mudarQuantidade(1)">+</button>
            </div>

            ${
              produtoAtual.estoque > 0
                ? `<button class="single-buy" onclick="comprarProduto()">Comprar</button>`
                : `<button class="single-buy disabled" disabled>Produto esgotado</button>`
            }
          </div>

          <div class="single-stock">
            Estoque disponível: <b>${produtoAtual.estoque}</b>
          </div>

          <div class="single-info-box">
            <h3>Detalhes</h3>
            <p>Produto vendido pela Jordan Wear Store. Pagamento via Pix. Pedido separado após confirmação.</p>
          </div>
        </div>
      `;
    }

    function trocarImagem(src, btn) {
      document.getElementById("mainProductImage").src = src;

      document.querySelectorAll(".single-thumbs button").forEach(b => {
        b.classList.remove("active");
      });

      btn.classList.add("active");
    }

    function selecionarTamanho(tamanho) {
      tamanhoSelecionado = tamanho;
    }

    function mudarQuantidade(valor) {
      const nova = quantidade + valor;

      if (nova < 1) return;
      if (nova > produtoAtual.estoque) return;

      quantidade = nova;
      document.getElementById("qtyText").textContent = quantidade;
    }

    function comprarProduto() {
      if (!produtoAtual) return;

      if (produtoAtual.estoque <= 0) {
        alert("Produto indisponível.");
        return;
      }

      const carrinho = JSON.parse(localStorage.getItem("jws_cart") || "[]");
      const cartId = `${produtoAtual.id}-${tamanhoSelecionado}`;

      const item = carrinho.find(i => i.cartId === cartId);

      if (item) {
        item.quantidade += quantidade;
      } else {
        carrinho.push({
          cartId,
          id: produtoAtual.id,
          nome: `${produtoAtual.nome} - Tam. ${tamanhoSelecionado}`,
          preco: produtoAtual.preco,
          imagem: produtoAtual.imagem,
          quantidade
        });
      }

      localStorage.setItem("jws_cart", JSON.stringify(carrinho));
      atualizarContadorCarrinho();

      alert("Produto adicionado ao carrinho.");
    }

    function atualizarContadorCarrinho() {
      const carrinho = JSON.parse(localStorage.getItem("jws_cart") || "[]");
      const total = carrinho.reduce((s, i) => s + Number(i.quantidade || 0), 0);
      document.getElementById("productCartCount").textContent = total;
    }

    carregarProduto();
  </script>
</body>
</html>
