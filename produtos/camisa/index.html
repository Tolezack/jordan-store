<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produto - Jordan Wear</title>
  <link rel="stylesheet" href="../../style.css" />
</head>
<body class="product-page-body">
  <header class="product-header-v2">
    <a href="../../index.html" class="product-back-v2">←</a>

    <a href="../../index.html" class="product-logo-v2">jordanwear</a>

    <button class="product-cart-v2" onclick="voltarCarrinho()" aria-label="Abrir carrinho">
      <img src="../../Carrinho.svg" alt="Carrinho" />
      <span id="productCartCount">0</span>
    </button>
  </header>

  <main class="product-main-v2">
    <section class="product-detail-v2" id="produtoView">
      <div class="loading">
        <div>
          <div class="spinner"></div>
          <p>Carregando produto...</p>
        </div>
      </div>
    </section>
  </main>

  <script>
    let produtoAtual = null;
    let quantidade = 1;
    let tamanhoSelecionado = "";
    let imagens = [];
    let imagemAtual = 0;
    let autoSlideTimer = null;

    function money(value) {
      return Number(value || 0).toFixed(2).replace(".", ",");
    }

    function getIdProduto() {
      return new URLSearchParams(location.search).get("id");
    }

    function normalizarCategoria(categoria) {
      const c = String(categoria || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();

      if (c.includes("camisa") || c.includes("camiseta")) return "camisa";
      if (c.includes("calca")) return "calca";
      if (c.includes("tenis") || c.includes("sapato")) return "tenis";
      return c || "camisa";
    }

    function getImagensProduto(p) {
      const lista = [];

      if (p.imagem) lista.push(p.imagem);

      if (Array.isArray(p.imagens)) {
        p.imagens.forEach(img => {
          if (img && !lista.includes(img)) lista.push(img);
        });
      }

      return lista.length ? lista : ["https://via.placeholder.com/900"];
    }

    function getTamanhosProduto(p) {
      if (p.estoqueTamanhos && typeof p.estoqueTamanhos === "object") {
        return Object.keys(p.estoqueTamanhos).filter(Boolean);
      }

      if (Array.isArray(p.tamanhos) && p.tamanhos.length) {
        return p.tamanhos;
      }

      return ["P", "M", "G", "GG"];
    }

    function getEstoqueTamanho(tamanho) {
      if (!produtoAtual) return 0;

      if (produtoAtual.estoqueTamanhos && typeof produtoAtual.estoqueTamanhos === "object") {
        return Number(produtoAtual.estoqueTamanhos[tamanho] || 0);
      }

      return Number(produtoAtual.estoque || 0);
    }

    function getEstoqueTotal(p) {
      if (p.estoqueTamanhos && typeof p.estoqueTamanhos === "object") {
        return Object.values(p.estoqueTamanhos).reduce((s, n) => s + Number(n || 0), 0);
      }

      return Number(p.estoque || 0);
    }

    async function carregarProduto() {
      const view = document.getElementById("produtoView");
      const id = getIdProduto();

      try {
        const res = await fetch("../../produtos.json");

        if (!res.ok) throw new Error("produtos.json não encontrado");

        const data = await res.json();
        const produtos = Array.isArray(data) ? data : data.produtos || [];

        produtoAtual = produtos.find(p => String(p.id) === String(id));

        if (!produtoAtual) {
          view.innerHTML = `
            <div class="single-product-error">
              <h1>Produto não encontrado</h1>
              <p>Volte para a loja e escolha outro produto.</p>
              <a href="../../index.html">Voltar para loja</a>
            </div>
          `;
          return;
        }

        produtoAtual.preco = Number(produtoAtual.preco || 0);
        produtoAtual.categoria = normalizarCategoria(produtoAtual.categoria);
        produtoAtual.estoque = getEstoqueTotal(produtoAtual);

        imagens = getImagensProduto(produtoAtual);
        tamanhoSelecionado = getTamanhosProduto(produtoAtual)[0] || "Único";

        document.title = `${produtoAtual.nome} - Jordan Wear`;

        renderProduto();
        atualizarContadorCarrinho();
        startAutoSlide();
      } catch (err) {
        console.error(err);

        view.innerHTML = `
          <div class="single-product-error">
            <h1>Erro ao carregar</h1>
            <p>Verifique se o produtos.json está na raiz do site.</p>
            <a href="../../index.html">Voltar para loja</a>
          </div>
        `;
      }
    }

    function renderProduto() {
      const view = document.getElementById("produtoView");
      const tamanhos = getTamanhosProduto(produtoAtual);
      const estoqueSelecionado = getEstoqueTamanho(tamanhoSelecionado);

      view.innerHTML = `
        <section class="product-gallery-v2">
          <div class="image-count-v2" id="imageCounter">${imagemAtual + 1}/${imagens.length}</div>

          <button class="gallery-arrow-v2 left" onclick="mudarImagem(-1)" aria-label="Imagem anterior">‹</button>

          <div class="gallery-scroll-v2" id="galleryScroll">
            ${imagens.map((img, index) => `
              <div class="gallery-slide-v2">
                <img
                  src="${img}"
                  alt="${produtoAtual.nome} ${index + 1}"
                  onerror="this.src='https://via.placeholder.com/900'"
                />
              </div>
            `).join("")}
          </div>

          <button class="gallery-arrow-v2 right" onclick="mudarImagem(1)" aria-label="Próxima imagem">›</button>

          ${imagens.length > 1 ? `
            <div class="gallery-dots-v2">
              ${imagens.map((_, index) => `
                <button class="${index === imagemAtual ? "active" : ""}" onclick="irImagem(${index})"></button>
              `).join("")}
            </div>
          ` : ""}
        </section>

        <section class="product-info-v2">
          <div class="product-path-v2">
            <a href="../../index.html">Início</a>
            <span>/</span>
            <a href="../../index.html">${produtoAtual.categoria}</a>
          </div>

          <h1>${produtoAtual.nome}</h1>

          <div class="product-price-v2">R$ ${money(produtoAtual.preco)}</div>
          <div class="product-pix-v2">R$ ${money(produtoAtual.preco * 0.97)} no Pix</div>

          <p class="product-desc-v2">
            ${produtoAtual.descricao || "Produto selecionado da Jordan Wear Store."}
          </p>

          <div class="product-size-block-v2">
            <div class="product-label-row-v2">
              <label>Tamanho</label>
              <span id="stockText">${estoqueSelecionado} em estoque</span>
            </div>

            <div class="size-list-v2">
              ${tamanhos.map(tamanho => {
                const estoque = getEstoqueTamanho(tamanho);
                const ativo = tamanho === tamanhoSelecionado;
                const semEstoque = estoque <= 0;

                return `
                  <button
                    class="${ativo ? "active" : ""} ${semEstoque ? "disabled" : ""}"
                    onclick="selecionarTamanho('${tamanho}')"
                    ${semEstoque ? "disabled" : ""}
                  >
                    <b>${tamanho}</b>
                    <small>${estoque}</small>
                  </button>
                `;
              }).join("")}
            </div>
          </div>

          <div class="product-action-row-v2">
            <div class="qty-v2">
              <button onclick="mudarQuantidade(-1)">−</button>
              <span id="qtyText">${quantidade}</span>
              <button onclick="mudarQuantidade(1)">+</button>
            </div>

            ${estoqueSelecionado > 0
              ? `<button class="buy-v2" onclick="comprarProduto()">Comprar</button>`
              : `<button class="buy-v2 disabled" disabled>Esgotado</button>`
            }
          </div>

          <div class="product-box-v2">
            <h3>Sobre a peça</h3>
            <p>Pagamento via Pix. O pedido é separado depois da confirmação do pagamento. Escolha o tamanho antes de comprar.</p>
          </div>
        </section>
      `;

      const scroll = document.getElementById("galleryScroll");

      if (scroll) {
        scroll.addEventListener("scroll", onGalleryScroll, { passive: true });
      }
    }

    function onGalleryScroll() {
      const scroll = document.getElementById("galleryScroll");
      if (!scroll) return;

      const index = Math.round(scroll.scrollLeft / scroll.clientWidth);

      if (index !== imagemAtual) {
        imagemAtual = Math.max(0, Math.min(imagens.length - 1, index));
        atualizarImagemUI();
      }
    }

    function atualizarImagemUI() {
      const counter = document.getElementById("imageCounter");
      if (counter) counter.textContent = `${imagemAtual + 1}/${imagens.length}`;

      document.querySelectorAll(".gallery-dots-v2 button").forEach((btn, i) => {
        btn.classList.toggle("active", i === imagemAtual);
      });
    }

    function irImagem(index) {
      const scroll = document.getElementById("galleryScroll");
      if (!scroll) return;

      imagemAtual = Math.max(0, Math.min(imagens.length - 1, index));
      scroll.scrollTo({ left: scroll.clientWidth * imagemAtual, behavior: "smooth" });
      atualizarImagemUI();
      startAutoSlide();
    }

    function mudarImagem(direcao) {
      let index = imagemAtual + direcao;

      if (index < 0) index = imagens.length - 1;
      if (index >= imagens.length) index = 0;

      irImagem(index);
    }

    function startAutoSlide() {
      clearInterval(autoSlideTimer);

      if (imagens.length <= 1) return;

      autoSlideTimer = setInterval(() => {
        mudarImagem(1);
      }, 4500);
    }

    function selecionarTamanho(tamanho) {
      tamanhoSelecionado = tamanho;
      quantidade = 1;
      renderProduto();
      startAutoSlide();
    }

    function mudarQuantidade(valor) {
      const estoque = getEstoqueTamanho(tamanhoSelecionado);
      const nova = quantidade + valor;

      if (nova < 1) return;
      if (nova > estoque) return;

      quantidade = nova;
      document.getElementById("qtyText").textContent = quantidade;
    }

    function comprarProduto() {
      if (!produtoAtual) return;

      const estoque = getEstoqueTamanho(tamanhoSelecionado);

      if (estoque <= 0) {
        alert("Produto indisponível nesse tamanho.");
        return;
      }

      if (quantidade > estoque) {
        alert("Quantidade maior que o estoque desse tamanho.");
        return;
      }

      const carrinho = JSON.parse(localStorage.getItem("jws_cart") || "[]");
      const cartId = `${produtoAtual.id}-${tamanhoSelecionado}`;
      const item = carrinho.find(i => i.cartId === cartId);

      if (item) {
        const novaQuantidade = Number(item.quantidade || 0) + quantidade;

        if (novaQuantidade > estoque) {
          alert("Você já colocou o máximo desse tamanho no carrinho.");
          return;
        }

        item.quantidade = novaQuantidade;
      } else {
        carrinho.push({
          cartId,
          id: produtoAtual.id,
          tamanho: tamanhoSelecionado,
          nome: `${produtoAtual.nome} - Tam. ${tamanhoSelecionado}`,
          preco: produtoAtual.preco,
          imagem: imagens[0],
          quantidade
        });
      }

      localStorage.setItem("jws_cart", JSON.stringify(carrinho));
      atualizarContadorCarrinho();
      alert("Produto adicionado ao carrinho.");
    }

    function atualizarContadorCarrinho() {
      const carrinho = JSON.parse(localStorage.getItem("jws_cart") || "[]");
      const total = carrinho.reduce((s, i) => s + Number(i.quantidade || 0), 0);
      document.getElementById("productCartCount").textContent = total;
    }

    function voltarCarrinho() {
      window.location.href = "../../index.html#carrinho";
    }

    carregarProduto();
  </script>
</body>
</html>
