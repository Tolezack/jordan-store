<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Produto - Jordan Wear</title>

  <style>
    :root {
      --bg: #eeeeee;
      --text: #050505;
      --line: #cccccc;
      --muted: #666666;
      --black: #000000;
      --white: #ffffff;
      --red: #e01818;
      --green: #15934f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      background: none;
      color: inherit;
    }

    .produto-topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 86px;
      background: #f6f6f6;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 82px;
    }

    .produto-voltar {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      color: #111;
      text-decoration: none;
      font-size: 36px;
      font-weight: 900;
      line-height: 1;
    }

    .produto-logo {
      color: #111;
      text-decoration: none;
      font-size: 19px;
      font-weight: 900;
      text-transform: lowercase;
      letter-spacing: -0.04em;
    }

    .produto-carrinho {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      text-decoration: none;
      font-size: 0;
    }

    .produto-carrinho img {
      width: 36px;
      height: 36px;
      display: block;
      object-fit: contain;
    }

    .produto-carrinho span {
      position: absolute;
      top: 1px;
      right: 0;
      min-width: 21px;
      height: 21px;
      border-radius: 999px;
      background: #111;
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .produto-main {
      width: min(1180px, calc(100% - 28px));
      margin: 26px auto 60px;
    }

    .produto-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(360px, 0.85fr);
      gap: 34px;
      align-items: start;
    }

    .produto-loading,
    .produto-erro {
      min-height: 360px;
      background: #fff;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 28px;
    }

    .produto-erro h1 {
      font-size: 38px;
      text-transform: uppercase;
      letter-spacing: -0.05em;
    }

    .produto-erro p {
      color: #666;
      margin-top: 10px;
    }

    .produto-erro a {
      margin-top: 18px;
      display: inline-flex;
      background: #111;
      color: #fff;
      text-decoration: none;
      padding: 14px 18px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .produto-galeria {
      min-width: 0;
    }

    .produto-foto-box {
      position: relative;
      width: 100%;
      background: #dfdfdf;
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .produto-foto-box img {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      display: block;
    }

    .foto-count {
      position: absolute;
      left: 14px;
      bottom: 14px;
      background: rgba(0, 0, 0, 0.82);
      color: #fff;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .foto-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 3;
      width: 46px;
      height: 60px;
      background: rgba(255, 255, 255, 0.85);
      color: #111;
      border: 1px solid rgba(0, 0, 0, 0.18);
      font-size: 42px;
      line-height: 1;
      display: grid;
      place-items: center;
    }

    .foto-prev {
      left: 10px;
    }

    .foto-next {
      right: 10px;
    }

    .produto-thumbs {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .produto-thumbs button {
      background: #fff;
      border: 1px solid #d0d0d0;
      padding: 0;
      overflow: hidden;
    }

    .produto-thumbs button.active {
      border-color: #111;
      outline: 2px solid #111;
    }

    .produto-thumbs img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }

    .produto-info {
      min-width: 0;
      padding-top: 6px;
    }

    .produto-breadcrumb {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: #777;
      font-size: 15px;
      margin-bottom: 12px;
    }

    .produto-breadcrumb a {
      color: #777;
      text-decoration: none;
    }

    .produto-info h1 {
      font-size: clamp(38px, 5vw, 66px);
      line-height: 0.96;
      letter-spacing: -0.06em;
      text-transform: uppercase;
      margin-bottom: 22px;
    }

    .produto-preco {
      font-size: clamp(34px, 4vw, 54px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .produto-pix {
      margin-top: 8px;
      color: var(--red);
      font-size: clamp(20px, 2.5vw, 30px);
      font-weight: 900;
    }

    .produto-desc {
      margin: 26px 0;
      max-width: 620px;
      color: #333;
      line-height: 1.65;
      font-size: 15px;
    }

    .produto-label {
      display: block;
      margin-bottom: 10px;
      font-size: 15px;
      color: #222;
      font-weight: 700;
    }

    .produto-tamanhos {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 22px;
    }

    .produto-tamanhos button {
      min-width: 76px;
      min-height: 52px;
      border: 1px solid #bcbcbc;
      background: #f7f7f7;
      color: #111;
      display: grid;
      place-items: center;
      padding: 6px 10px;
    }

    .produto-tamanhos button strong {
      font-size: 16px;
      line-height: 1;
    }

    .produto-tamanhos button span {
      margin-top: 2px;
      font-size: 11px;
      color: #666;
    }

    .produto-tamanhos button.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .produto-tamanhos button.active span {
      color: #ddd;
    }

    .produto-tamanhos button.off {
      opacity: 0.38;
      cursor: not-allowed;
    }

    .produto-compra-linha {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 18px;
      align-items: center;
      margin-bottom: 14px;
    }

    .produto-quantidade {
      height: 62px;
      border: 1px solid #aaaaaa;
      background: #eeeeee;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: center;
    }

    .produto-quantidade button {
      height: 100%;
      color: #000;
      font-size: 34px;
      font-weight: 900;
      line-height: 1;
    }

    .produto-quantidade span {
      text-align: center;
      font-size: 24px;
    }

    .produto-comprar {
      height: 62px;
      background: #000;
      color: #fff;
      border-radius: 0;
      font-size: 15px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.22em;
    }

    .produto-comprar.off {
      background: #d1d1d1;
      color: #777;
      cursor: not-allowed;
    }

    .produto-estoque-info {
      color: #555;
      font-size: 14px;
      margin-bottom: 26px;
    }

    .produto-detalhes-box {
      border-top: 1px solid #cfcfcf;
      padding-top: 20px;
    }

    .produto-detalhes-box summary {
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
    }

    .produto-detalhes-box p {
      margin-top: 12px;
      color: #555;
      line-height: 1.7;
    }

    .add-animation {
      position: fixed;
      z-index: 9999;
      width: 80px;
      height: 100px;
      object-fit: cover;
      border: 1px solid #111;
      pointer-events: none;
      animation: flyToCart 0.75s ease-in forwards;
    }

    @keyframes flyToCart {
      to {
        transform: translate(var(--x), var(--y)) scale(0.15);
        opacity: 0.2;
      }
    }

    .cart-pulse {
      animation: cartPulse 0.4s ease;
    }

    @keyframes cartPulse {
      0% {
        transform: translateY(-50%) scale(1);
      }

      50% {
        transform: translateY(-50%) scale(1.18);
      }

      100% {
        transform: translateY(-50%) scale(1);
      }
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 9999;
      background: #111;
      color: #fff;
      padding: 14px 18px;
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      animation: toastIn 0.2s ease, toastOut 0.2s ease 2s forwards;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
    }

    @keyframes toastOut {
      to {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
    }

    @media (max-width: 880px) {
      .produto-topbar {
        height: 76px;
        padding: 0 76px;
      }

      .produto-voltar {
        left: 8px;
        width: 54px;
        height: 54px;
        font-size: 38px;
      }

      .produto-carrinho {
        right: 10px;
      }

      .produto-main {
        width: 100%;
        margin: 0 auto 42px;
      }

      .produto-shell {
        display: block;
      }

      .produto-galeria {
        width: 100%;
      }

      .produto-foto-box {
        border-left: 0;
        border-right: 0;
      }

      .produto-foto-box img {
        aspect-ratio: 4 / 5;
      }

      .produto-thumbs {
        display: flex;
        overflow-x: auto;
        padding: 10px 12px 0;
        gap: 8px;
        scroll-snap-type: x mandatory;
      }

      .produto-thumbs button {
        min-width: 72px;
        scroll-snap-align: start;
      }

      .produto-info {
        padding: 18px 18px 0;
      }

      .produto-info h1 {
        font-size: 42px;
      }

      .produto-preco {
        font-size: 42px;
      }

      .produto-pix {
        font-size: 24px;
      }

      .produto-compra-linha {
        grid-template-columns: 0.85fr 1.65fr;
        gap: 12px;
      }

      .produto-quantidade,
      .produto-comprar {
        height: 58px;
      }

      .foto-nav {
        width: 40px;
        height: 54px;
        font-size: 36px;
      }
    }

    @media (max-width: 480px) {
      .produto-info {
        padding: 16px 14px 0;
      }

      .produto-info h1 {
        font-size: 34px;
      }

      .produto-preco {
        font-size: 36px;
      }

      .produto-pix {
        font-size: 21px;
      }

      .produto-desc {
        margin: 20px 0;
      }

      .produto-tamanhos button {
        min-width: 62px;
      }

      .produto-compra-linha {
        grid-template-columns: 0.75fr 1.6fr;
        gap: 10px;
      }

      .produto-quantidade button {
        font-size: 28px;
      }

      .produto-quantidade span {
        font-size: 20px;
      }

      .produto-comprar {
        font-size: 13px;
        letter-spacing: 0.16em;
      }
    }
  </style>
</head>

<body>
  <header class="produto-topbar">
    <a class="produto-voltar" href="../../index.html">‹</a>

    <a class="produto-logo" href="../../index.html">jordanwear</a>

    <a class="produto-carrinho" href="../../index.html#cart" id="cartIcon">
      <img src="../../Carrinho.svg" alt="Carrinho" onerror="this.style.display='none'" />
      <span id="cartCount">0</span>
    </a>
  </header>

  <main class="produto-main">
    <section id="produtoView">
      <div class="produto-loading">
        <div>
          <p>Carregando produto...</p>
        </div>
      </div>
    </section>
  </main>

  <script>
    let produtoAtual = null;
    let imagensProduto = [];
    let imagemAtual = 0;
    let tamanhoSelecionado = "";
    let quantidade = 1;
    let autoSlideTimer = null;

    function money(value) {
      return Number(value || 0).toFixed(2).replace(".", ",");
    }

    function getIdProduto() {
      return new URLSearchParams(location.search).get("id");
    }

    function normalizarTexto(texto) {
      return String(texto || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
    }

    function normalizarCategoria(categoria) {
      const c = normalizarTexto(categoria);

      if (c.includes("camisa") || c.includes("camiseta")) return "camisa";
      if (c.includes("calca")) return "calca";
      if (c.includes("tenis") || c.includes("sapato")) return "tenis";
      if (c.includes("bermuda") || c.includes("short")) return "bermuda";
      if (c.includes("moletom") || c.includes("blusa")) return "moletom";

      return c || "camisa";
    }

    function normalizarTamanho(tamanho) {
      return String(tamanho || "")
        .trim()
        .toUpperCase();
    }

    function getEstoqueTamanhos(produto) {
      const estoque =
        produto.estoqueTamanhos ||
        produto.estoque_tamanhos ||
        produto.estoques ||
        {};

      const limpo = {};

      if (
        estoque &&
        typeof estoque === "object" &&
        !Array.isArray(estoque)
      ) {
        Object.entries(estoque).forEach(([tamanho, quantidade]) => {
          const tam = normalizarTamanho(tamanho);

          if (tam) {
            limpo[tam] = Number(quantidade || 0);
          }
        });
      }

      return limpo;
    }

    function getTamanhosProduto(produto) {
      const estoque = getEstoqueTamanhos(produto);
      const tamanhosDoEstoque = Object.keys(estoque);

      if (tamanhosDoEstoque.length > 0) {
        return tamanhosDoEstoque;
      }

      if (Array.isArray(produto.tamanhos) && produto.tamanhos.length > 0) {
        return produto.tamanhos
          .map(normalizarTamanho)
          .filter(Boolean);
      }

      return ["P", "M", "G", "GG"];
    }

    function getEstoqueTotal(produto) {
      const estoque = getEstoqueTamanhos(produto);
      const valores = Object.values(estoque);

      if (valores.length > 0) {
        return valores.reduce((s, v) => s + Number(v || 0), 0);
      }

      return Number(produto.estoque || 0);
    }

    function getEstoqueDoTamanho(tamanho) {
      if (!produtoAtual) return 0;

      const estoque = getEstoqueTamanhos(produtoAtual);
      const tam = normalizarTamanho(tamanho);

      if (Object.keys(estoque).length > 0) {
        return Number(estoque[tam] || 0);
      }

      return Number(produtoAtual.estoque || 0);
    }

    function getFotosProduto(produto) {
      const fotos = [];

      if (produto.imagem) {
        fotos.push(String(produto.imagem).trim());
      }

      if (Array.isArray(produto.imagens)) {
        produto.imagens.forEach(img => {
          const foto = String(img || "").trim();

          if (foto && !fotos.includes(foto)) {
            fotos.push(foto);
          }
        });
      }

      return fotos.filter(Boolean);
    }

    function atualizarContadorCarrinho() {
      const carrinho = JSON.parse(localStorage.getItem("jws_cart") || "[]");
      const total = carrinho.reduce((s, i) => s + Number(i.quantidade || 0), 0);

      const count = document.getElementById("cartCount");
      if (count) count.textContent = total;
    }

    async function carregarProduto() {
      const view = document.getElementById("produtoView");
      const id = getIdProduto();

      try {
        const res = await fetch(`../../produtos.json?cache=${Date.now()}`);

        if (!res.ok) {
          throw new Error("produtos.json não encontrado");
        }

        const data = await res.json();
        const produtos = Array.isArray(data) ? data : data.produtos || [];

        produtoAtual = produtos.find(p => String(p.id) === String(id));

        if (!produtoAtual) {
          view.innerHTML = `
            <div class="produto-erro">
              <div>
                <h1>Produto não encontrado</h1>
                <p>Volte para a loja e escolha outro produto.</p>
                <a href="../../index.html">Voltar para loja</a>
              </div>
            </div>
          `;
          return;
        }

        produtoAtual.preco = Number(produtoAtual.preco || 0);
        produtoAtual.categoria = normalizarCategoria(produtoAtual.categoria);
        produtoAtual.estoque = getEstoqueTotal(produtoAtual);
        produtoAtual.tamanhos = getTamanhosProduto(produtoAtual);

        imagensProduto = getFotosProduto(produtoAtual);

        if (!imagensProduto.length) {
          imagensProduto = ["https://via.placeholder.com/900"];
        }

        const primeiroComEstoque = produtoAtual.tamanhos.find(tamanho => {
          return getEstoqueDoTamanho(tamanho) > 0;
        });

        tamanhoSelecionado = primeiroComEstoque || produtoAtual.tamanhos[0] || "P";
        quantidade = 1;
        imagemAtual = 0;

        document.title = `${produtoAtual.nome} - Jordan Wear`;

        renderProduto();
        atualizarContadorCarrinho();
        iniciarAutoSlide();
      } catch (err) {
        console.error(err);

        view.innerHTML = `
          <div class="produto-erro">
            <div>
              <h1>Erro ao carregar</h1>
              <p>Verifique se o produtos.json está na raiz do site.</p>
              <a href="../../index.html">Voltar para loja</a>
            </div>
          </div>
        `;
      }
    }

    function renderProduto() {
      const view = document.getElementById("produtoView");

      const tamanhosProduto = getTamanhosProduto(produtoAtual);
      const estoqueSelecionado = getEstoqueDoTamanho(tamanhoSelecionado);
      const imagemPrincipal = imagensProduto[imagemAtual] || imagensProduto[0];
      const totalEstoque = getEstoqueTotal(produtoAtual);

      view.innerHTML = `
        <div class="produto-shell">
          <div class="produto-galeria">
            <div class="produto-foto-box">
              ${
                imagensProduto.length > 1
                  ? `<button class="foto-nav foto-prev" onclick="trocarImagem(-1)">‹</button>`
                  : ""
              }

              <img
                id="imagemPrincipal"
                src="${imagemPrincipal}"
                alt="${produtoAtual.nome}"
                onerror="this.src='https://via.placeholder.com/900'"
              />

              ${
                imagensProduto.length > 1
                  ? `<button class="foto-nav foto-next" onclick="trocarImagem(1)">›</button>`
                  : ""
              }

              <div class="foto-count">${imagemAtual + 1}/${imagensProduto.length}</div>
            </div>

            ${
              imagensProduto.length > 1
                ? `
                  <div class="produto-thumbs">
                    ${imagensProduto.map((img, index) => `
                      <button
                        class="${index === imagemAtual ? "active" : ""}"
                        onclick="setImagem(${index})"
                      >
                        <img src="${img}" onerror="this.src='https://via.placeholder.com/160'" />
                      </button>
                    `).join("")}
                  </div>
                `
                : ""
            }
          </div>

          <div class="produto-info">
            <div class="produto-breadcrumb">
              <a href="../../index.html">Início</a>
              <span>›</span>
              <a href="../../index.html">${produtoAtual.categoria}</a>
              <span>›</span>
              <span>${produtoAtual.nome}</span>
            </div>

            <h1>${produtoAtual.nome}</h1>

            <div class="produto-preco">
              R$ ${money(produtoAtual.preco)}
            </div>

            <div class="produto-pix">
              R$ ${money(produtoAtual.preco * 0.97)} com Pix
            </div>

            <div class="produto-desc">
              ${produtoAtual.descricao || "Produto selecionado da Jordan Wear Store."}
            </div>

            <label class="produto-label">Tamanho</label>

            <div class="produto-tamanhos">
              ${tamanhosProduto.map(tamanho => {
                const tam = normalizarTamanho(tamanho);
                const qtd = getEstoqueDoTamanho(tam);
                const active = tam === tamanhoSelecionado ? "active" : "";
                const off = qtd <= 0 ? "off" : "";

                return `
                  <button
                    class="${active} ${off}"
                    onclick="selecionarTamanho('${tam}')"
                    ${qtd <= 0 ? "disabled" : ""}
                  >
                    <strong>${tam}</strong>
                    <span>${qtd} un.</span>
                  </button>
                `;
              }).join("")}
            </div>

            <div class="produto-compra-linha">
              <div class="produto-quantidade">
                <button onclick="mudarQuantidade(-1)">−</button>
                <span>${quantidade}</span>
                <button onclick="mudarQuantidade(1)">+</button>
              </div>

              ${
                estoqueSelecionado > 0
                  ? `<button class="produto-comprar" onclick="comprarProduto()">Comprar</button>`
                  : `<button class="produto-comprar off" disabled>Indisponível</button>`
              }
            </div>

            <div class="produto-estoque-info">
              Estoque do tamanho ${tamanhoSelecionado}: <b>${estoqueSelecionado}</b> unidade(s)
              <br>
              Estoque total: <b>${totalEstoque}</b> unidade(s)
            </div>

            <details class="produto-detalhes-box" open>
              <summary>Detalhes</summary>
              <p>
                Produto vendido pela Jordan Wear Store. Pagamento via Pix.
                Pedido separado após confirmação.
              </p>
            </details>
          </div>
        </div>
      `;
    }

    function selecionarTamanho(tamanho) {
      tamanhoSelecionado = normalizarTamanho(tamanho);
      quantidade = 1;
      renderProduto();
    }

    function mudarQuantidade(valor) {
      const estoqueAtual = getEstoqueDoTamanho(tamanhoSelecionado);
      const novaQuantidade = quantidade + valor;

      if (novaQuantidade < 1) return;
      if (novaQuantidade > estoqueAtual) return;

      quantidade = novaQuantidade;
      renderProduto();
    }

    function setImagem(index) {
      imagemAtual = index;
      renderProduto();
      reiniciarAutoSlide();
    }

    function trocarImagem(direcao) {
      if (!imagensProduto.length) return;

      imagemAtual += direcao;

      if (imagemAtual < 0) {
        imagemAtual = imagensProduto.length - 1;
      }

      if (imagemAtual >= imagensProduto.length) {
        imagemAtual = 0;
      }

      renderProduto();
      reiniciarAutoSlide();
    }

    function iniciarAutoSlide() {
      if (autoSlideTimer) {
        clearInterval(autoSlideTimer);
      }

      if (imagensProduto.length <= 1) return;

      autoSlideTimer = setInterval(() => {
        imagemAtual = (imagemAtual + 1) % imagensProduto.length;
        renderProduto();
      }, 4500);
    }

    function reiniciarAutoSlide() {
      iniciarAutoSlide();
    }

    function comprarProduto() {
      if (!produtoAtual) return;

      const estoqueAtual = getEstoqueDoTamanho(tamanhoSelecionado);

      if (estoqueAtual <= 0) {
        toast("Tamanho indisponível");
        return;
      }

      if (quantidade > estoqueAtual) {
        toast("Quantidade maior que o estoque");
        return;
      }

      const carrinho = JSON.parse(localStorage.getItem("jws_cart") || "[]");
      const cartId = `${produtoAtual.id}-${tamanhoSelecionado}`;
      const item = carrinho.find(i => i.cartId === cartId);

      if (item) {
        const novaQuantidade = Number(item.quantidade || 0) + quantidade;

        if (novaQuantidade > estoqueAtual) {
          toast("Quantidade máxima desse tamanho");
          return;
        }

        item.quantidade = novaQuantidade;
      } else {
        carrinho.push({
          cartId,
          id: produtoAtual.id,
          nome: `${produtoAtual.nome} - Tam. ${tamanhoSelecionado}`,
          tamanho: tamanhoSelecionado,
          preco: produtoAtual.preco,
          imagem: imagensProduto[0] || produtoAtual.imagem || "",
          quantidade
        });
      }

      localStorage.setItem("jws_cart", JSON.stringify(carrinho));
      atualizarContadorCarrinho();
      animarCarrinho();
      toast("Adicionado ao carrinho");
    }

    function animarCarrinho() {
      const img = document.getElementById("imagemPrincipal");
      const cart = document.getElementById("cartIcon");

      if (!img || !cart) return;

      const imgRect = img.getBoundingClientRect();
      const cartRect = cart.getBoundingClientRect();

      const clone = document.createElement("img");
      clone.src = img.src;
      clone.className = "add-animation";
      clone.style.left = `${imgRect.left}px`;
      clone.style.top = `${imgRect.top}px`;

      clone.style.setProperty("--x", `${cartRect.left - imgRect.left}px`);
      clone.style.setProperty("--y", `${cartRect.top - imgRect.top}px`);

      document.body.appendChild(clone);

      cart.classList.remove("cart-pulse");
      void cart.offsetWidth;
      cart.classList.add("cart-pulse");

      setTimeout(() => {
        clone.remove();
      }, 800);
    }

    function toast(texto) {
      const antigo = document.querySelector(".toast");

      if (antigo) {
        antigo.remove();
      }

      const el = document.createElement("div");
      el.className = "toast";
      el.textContent = texto;

      document.body.appendChild(el);

      setTimeout(() => {
        el.remove();
      }, 2300);
    }

    carregarProduto();
  </script>
</body>
</html>
